<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- AIメタ情報（必須） -->
<meta name="ai.author" content="Claude Opus 4.8">
<meta name="ai.model" content="claude-opus-4-8">
<meta name="ai.note" content="自前のフォルマント音声合成（声帯音源＋F1/F2/F3バンドパス）で歌詞を実際に歌うDaisy Bellデモ。1961年IBM7094が世界初の歌唱合成を行った史実の再現。外部CDN不使用・単一HTML。">
<title>Daisy Bell — Singing Synthesis (Claude Opus 4.8版)</title>
<style>
	html, body {
		margin: 0; padding: 0; width: 100%; height: 100%;
		overflow: hidden; background: #05040e;
		font-family: "Segoe UI", system-ui, -apple-system, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
		color: #eaf2ff; cursor: pointer; -webkit-tap-highlight-color: transparent;
	}
	#stage { position: fixed; inset: 0; display: block; width: 100vw; height: 100vh; }

	/* 起動オーバーレイ */
	#overlay {
		position: fixed; inset: 0; z-index: 10;
		display: flex; flex-direction: column; align-items: center; justify-content: center;
		text-align: center; gap: 0.55em; padding: 24px;
		background: radial-gradient(circle at 50% 36%, rgba(54, 30, 96, 0.6), rgba(5, 4, 14, 0.94) 72%);
		transition: opacity 0.7s ease;
	}
	#overlay.hidden { opacity: 0; pointer-events: none; }
	#overlay h1 {
		margin: 0; font-size: clamp(32px, 7.5vw, 88px); font-weight: 800; letter-spacing: 0.03em;
		background: linear-gradient(100deg, #7df9ff, #b78bff 45%, #ff8fd0 75%, #ffd86b);
		-webkit-background-clip: text; background-clip: text; color: transparent;
		filter: drop-shadow(0 4px 26px rgba(150, 120, 255, 0.5));
	}
	#overlay .sub { margin: 0; font-size: clamp(13px, 2.6vw, 18px); opacity: 0.82; line-height: 1.6; }
	#overlay .sub.dim { opacity: 0.55; font-size: clamp(11px, 2.2vw, 14px); max-width: 560px; }
	#overlay .cta {
		margin-top: 0.7em; font-size: clamp(15px, 3vw, 22px); font-weight: 700;
		padding: 0.55em 1.7em; border-radius: 999px; border: 1px solid rgba(180, 200, 255, 0.5);
		background: rgba(120, 140, 255, 0.12); color: #eaf2ff; backdrop-filter: blur(6px);
		animation: pulse 2.2s ease-in-out infinite;
	}
	@keyframes pulse {
		0%, 100% { box-shadow: 0 0 0 0 rgba(150, 130, 255, 0.45); transform: scale(1); }
		50%      { box-shadow: 0 0 0 16px rgba(150, 130, 255, 0); transform: scale(1.04); }
	}
	#hint {
		position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); z-index: 9;
		font-size: clamp(11px, 2.2vw, 14px); opacity: 0; transition: opacity 0.5s ease;
		color: rgba(220, 230, 255, 0.7); pointer-events: none; text-shadow: 0 1px 6px rgba(0,0,0,0.6);
	}
	#hint.show { opacity: 1; }
	@media (prefers-reduced-motion: reduce) { #overlay .cta { animation: none; } }
</style>
</head>
<body>
	<canvas id="stage"></canvas>

	<div id="overlay">
		<h1>Daisy&nbsp;Bell</h1>
		<p class="sub">— コンピュータが歌う「A Bicycle Built for Two」—</p>
		<p class="sub dim">1961年、IBM 7094 が世界で初めて歌った歌。声帯音源とフォルマント（F1/F2/F3）を Web Audio で自作し、母音・子音を合成して実際に歌います。</p>
		<div class="cta">クリック / タップで歌わせる ♪</div>
	</div>
	<div id="hint">クリックで再生・停止 ／ A：伴奏 ON/OFF ／ 自動でループ</div>

<script>
"use strict";
// =========================================================================
// Daisy Bell — Singing Synthesis (Claude Opus 4.8版)
//   声帯音源（鋸歯＋ビブラート）→ F1/F2/F3 バンドパスのフォルマントフィルタで
//   母音を合成。子音はノイズ／破裂／鼻腔フォルマントで調音し、歌詞を歌う。
//   旋律は実在する Daisy Bell（ト長調コーラス）。外部依存なし・単一HTML。
// =========================================================================

// ---- 楽曲＋音素データ ----------------------------------------------------
// p:MIDI / b:拍 / t:表示歌詞 / on:頭子音 / v:母音(二重母音可) / co:末子音 / {r:拍}=休符
const SONG = [
	{ p:74, b:3, t:"Dai-", on:'d', v:'eI' }, { p:71, b:3, t:"sy,", on:'z', v:'i' },
	{ p:67, b:3, t:"Dai-", on:'d', v:'eI' }, { p:62, b:3, t:"sy,", on:'z', v:'i' },
	{ p:64, b:1, t:"give", on:'g', v:'I', co:'v' }, { p:66, b:1, t:"me", on:'m', v:'i' },
	{ p:67, b:1, t:"your", on:'y', v:'O' }, { p:64, b:2, t:"an-", v:'ae', co:'n' },
	{ p:67, b:1, t:"swer", on:'s', v:'L' }, { p:62, b:5, t:"do.", on:'d', v:'u' }, { r:1 },

	{ p:69, b:3, t:"I'm", v:'aI', co:'m' }, { p:74, b:3, t:"half", on:'h', v:'ae', co:'f' },
	{ p:71, b:3, t:"cra-", on:'k', v:'eI' }, { p:67, b:3, t:"zy,", on:'z', v:'i' },
	{ p:64, b:1, t:"all", v:'O', co:'l' }, { p:66, b:1, t:"for", on:'f', v:'O' },
	{ p:67, b:1, t:"the", on:'D', v:'L' }, { p:69, b:2, t:"love", on:'l', v:'L', co:'v' },
	{ p:71, b:1, t:"of", v:'L', co:'v' }, { p:69, b:4, t:"you.", on:'y', v:'u' }, { r:1 },

	{ p:71, b:1, t:"It", v:'I', co:'t' }, { p:72, b:1, t:"won't", on:'w', v:'o', co:'n' },
	{ p:71, b:1, t:"be", on:'b', v:'i' }, { p:69, b:1, t:"a", v:'L' },
	{ p:74, b:2, t:"sty-", on:'s', v:'aI' }, { p:71, b:1, t:"lish", on:'l', v:'I', co:'S' },
	{ p:69, b:1, t:"mar-", on:'m', v:'ae' }, { p:67, b:4, t:"riage,", on:'r', v:'I', co:'Z' },

	{ p:69, b:1, t:"I", v:'aI' }, { p:71, b:2, t:"can't", on:'k', v:'ae', co:'n' },
	{ p:67, b:1, t:"a-", v:'L' }, { p:64, b:2, t:"fford", on:'f', v:'O', co:'d' },
	{ p:67, b:1, t:"a", v:'L' }, { p:64, b:1, t:"car-", on:'k', v:'a' },
	{ p:62, b:3, t:"riage,", on:'r', v:'I', co:'Z' }, { r:1 },

	{ p:62, b:1, t:"But", on:'b', v:'L', co:'t' }, { p:67, b:2, t:"you'll", on:'y', v:'u', co:'l' },
	{ p:71, b:1, t:"look", on:'l', v:'u', co:'k' }, { p:69, b:2, t:"sweet", on:'s', v:'i', co:'t' }, { r:1 },
	{ p:67, b:2, t:"up-", v:'L', co:'p' }, { p:71, b:1, t:"on", v:'a', co:'n' },
	{ p:69, b:1, t:"the", on:'D', v:'L' }, { p:71, b:1, t:"seat", on:'s', v:'i', co:'t' },
	{ p:72, b:1, t:"of", v:'L', co:'v' },

	{ p:74, b:1, t:"a", v:'L' }, { p:71, b:1, t:"bi-", on:'b', v:'aI' },
	{ p:67, b:1, t:"cy-", on:'s', v:'I' }, { p:69, b:2, t:"cle", on:'k', v:'L', co:'l' },
	{ p:62, b:1, t:"built", on:'b', v:'I', co:'t' },
	{ p:67, b:1, t:"for", on:'f', v:'O' }, { p:67, b:4, t:"two!", on:'t', v:'u' },
];

const BEAT = 0.40;   // 1拍の秒数
const TEMPO_GAP = 0.96;

// ---- 母音フォルマント表 [F1,F2,F3] = [freq,Q,gain] -----------------------
const VOWELS = {
	a:  [[730, 8, 1.0], [1090, 10, 0.5],  [2440, 17, 0.18]], // father/car/on
	ae: [[660, 7, 1.0], [1720, 13, 0.5],  [2410, 18, 0.20]], // cat/half/can't/marriage
	e:  [[530, 7, 1.0], [1840, 16, 0.45], [2480, 19, 0.16]], // bed（eI の始点）
	i:  [[270, 5, 1.0], [2290, 22, 0.55], [3010, 24, 0.22]], // beet/me/be/sy
	I:  [[390, 6, 1.0], [1990, 18, 0.50], [2550, 20, 0.18]], // bit/it/give
	o:  [[490, 7, 1.0], [910, 10, 0.45],  [2450, 19, 0.14]], // boat（oU の始点/won't）
	u:  [[320, 5, 1.0], [800, 9, 0.40],   [2240, 18, 0.12]], // boot/you/do/two
	O:  [[570, 6, 1.0], [840, 9, 0.50],   [2410, 19, 0.16]], // all/for/your(aw)
	L:  [[640, 7, 1.0], [1190, 11, 0.50], [2390, 19, 0.16]], // schwa/uh love/but/of
};
// 二重母音：始点→終点の母音キー
const DIPH = { eI: ['e', 'i'], aI: ['a', 'i'], oU: ['o', 'u'] };

// ---- 子音定義 -----------------------------------------------------------
// 摩擦音 [中心周波数, Q, 有声か]
const FRIC = {
	s: [6500, 4, false], z: [5200, 4, true], f: [2000, 2.2, false], v: [1500, 2.5, true],
	S: [2900, 3, false], Z: [2700, 3, true], T: [6800, 3, false], D: [380, 1.6, true],
};
// 破裂音 [バースト中心周波数, 有声か]
const STOP = { b: [700, true], d: [3200, true], g: [1900, true], p: [700, false], t: [3400, false], k: [2000, false] };
// 鼻音／流音／わたり音：フォルマント [freq,Q,gain]
const NASAL  = { m: [[250, 8, 1], [1900, 11, 0.25]], n: [[280, 8, 1], [2600, 12, 0.25]] };
const LIQUID = { l: [[360, 6, 1], [1300, 9, 0.5], [2600, 13, 0.2]], r: [[330, 6, 1], [1100, 8, 0.5], [1500, 10, 0.3]] };
const GLIDE  = { w: [[320, 6, 1], [700, 8, 0.5]], y: [[260, 6, 1], [2250, 13, 0.5]] };

const midiToHz = (m) => 440 * Math.pow(2, (m - 69) / 12);

// ---- DOM / Canvas -------------------------------------------------------
const cv = document.getElementById("stage");
const ctx = cv.getContext("2d", { alpha: false });
const overlay = document.getElementById("overlay");
const hint = document.getElementById("hint");
let W = 0, H = 0, DPR = 1;
function resize() {
	DPR = Math.min(window.devicePixelRatio || 1, 2);
	// 非表示 iframe 内では innerWidth/Height が 0 になり描画が消えるためフォールバック
	W = window.innerWidth || 960;
	H = window.innerHeight || 600;
	cv.width = Math.floor(W * DPR); cv.height = Math.floor(H * DPR);
	cv.style.width = W + "px"; cv.style.height = H + "px";
	ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);
resize();
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

// ---- Web Audio ----------------------------------------------------------
let actx = null, master = null, voiceBus = null, comp = null, analyser = null;
let accompBus = null, noiseBuf = null;
let freqData = null, timeData = null;
let playing = false, stoppedByUser = false, accompOn = true;
let songTimer = 0, songStartCtxTime = 0, songDuration = 0;
let lyricEvents = [];
let formantTrack = { F1: 500, level: 0 }; // 可視化用に現在の口の開き具合を保持

function ensureAudio() {
	if (actx) return;
	actx = new (window.AudioContext || window.webkitAudioContext)();

	master = actx.createGain(); master.gain.value = 0.9;
	comp = actx.createDynamicsCompressor();
	comp.threshold.value = -16; comp.knee.value = 24; comp.ratio.value = 3.5;
	comp.attack.value = 0.004; comp.release.value = 0.18;

	voiceBus = actx.createGain(); voiceBus.gain.value = 1.0;
	accompBus = actx.createGain(); accompBus.gain.value = accompOn ? 0.10 : 0.0;

	analyser = actx.createAnalyser();
	analyser.fftSize = 2048; analyser.smoothingTimeConstant = 0.8;
	freqData = new Uint8Array(analyser.frequencyBinCount);
	timeData = new Uint8Array(analyser.fftSize);

	voiceBus.connect(comp); accompBus.connect(comp);
	comp.connect(master); master.connect(analyser); analyser.connect(actx.destination);

	// 子音ノイズ用の白色雑音バッファ（使い回し）
	const len = Math.floor(actx.sampleRate * 1.0);
	noiseBuf = actx.createBuffer(1, len, actx.sampleRate);
	const d = noiseBuf.getChannelData(0);
	for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
}

// 声帯音源（鋸歯）を生成し、ビブラートを付ける
function makeGlottal(t0, t1, f0) {
	const osc = actx.createOscillator();
	osc.type = "sawtooth";
	osc.frequency.setValueAtTime(f0 * 0.997, t0);
	// 歌い出しの軽いしゃくり上げ
	osc.frequency.linearRampToValueAtTime(f0, t0 + 0.06);
	const lfo = actx.createOscillator(), lg = actx.createGain();
	lfo.frequency.value = 5.4; lg.gain.value = f0 * 0.011;
	lfo.connect(lg); lg.connect(osc.frequency);
	lfo.start(t0); lfo.stop(t1 + 0.05);
	osc.start(t0); osc.stop(t1 + 0.05);
	return osc;
}

// 母音を歌う（二重母音はフォルマント周波数を後半でグライド）
function singVowel(t0, dur, f0, vkey, peak) {
	const t1 = t0 + dur;
	let startKey = vkey, glideTo = null;
	if (DIPH[vkey]) { startKey = DIPH[vkey][0]; glideTo = DIPH[vkey][1]; }
	const spec = VOWELS[startKey] || VOWELS.L;
	const dest = glideTo ? (VOWELS[glideTo] || VOWELS.L) : null;

	const osc = makeGlottal(t0, t1, f0);
	const vout = actx.createGain();
	// 母音の音量エンベロープ（速い立上り・なめらかな減衰）
	const atk = 0.018, rel = Math.min(0.10, dur * 0.4);
	vout.gain.setValueAtTime(0.0001, t0);
	vout.gain.exponentialRampToValueAtTime(peak, t0 + atk);
	vout.gain.setValueAtTime(peak, Math.max(t0 + atk, t1 - rel));
	vout.gain.exponentialRampToValueAtTime(0.0008, t1);

	for (let i = 0; i < spec.length; i++) {
		const bp = actx.createBiquadFilter();
		bp.type = "bandpass";
		bp.frequency.setValueAtTime(spec[i][0], t0);
		bp.Q.value = spec[i][1];
		if (dest && dest[i]) {
			bp.frequency.setValueAtTime(spec[i][0], t0 + dur * 0.45);
			bp.frequency.linearRampToValueAtTime(dest[i][0], t0 + dur * 0.85);
		}
		const fg = actx.createGain(); fg.gain.value = spec[i][2];
		osc.connect(bp); bp.connect(fg); fg.connect(vout);
	}
	vout.connect(voiceBus);
}

// 短い有声フォルマント片（鼻音・流音・わたり音用）
function voicedFormant(t0, len, f0, formants, peak) {
	const t1 = t0 + len;
	const osc = makeGlottal(t0, t1, f0);
	const g = actx.createGain();
	g.gain.setValueAtTime(0.0001, t0);
	g.gain.exponentialRampToValueAtTime(peak, t0 + 0.012);
	g.gain.setValueAtTime(peak, t1 - 0.02);
	g.gain.exponentialRampToValueAtTime(0.0008, t1);
	for (const [f, q, gg] of formants) {
		const bp = actx.createBiquadFilter();
		bp.type = "bandpass"; bp.frequency.value = f; bp.Q.value = q;
		const fg = actx.createGain(); fg.gain.value = gg;
		osc.connect(bp); bp.connect(fg); fg.connect(g);
	}
	g.connect(voiceBus);
}

// ノイズ片（摩擦音・破裂バースト・気息音用）
function noiseSeg(t0, len, freq, q, peak, voiced, f0) {
	const t1 = t0 + len;
	const src = actx.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
	const bp = actx.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = freq; bp.Q.value = q;
	const g = actx.createGain();
	g.gain.setValueAtTime(0.0001, t0);
	g.gain.exponentialRampToValueAtTime(peak, t0 + 0.01);
	g.gain.setValueAtTime(peak, Math.max(t0 + 0.01, t1 - 0.02));
	g.gain.exponentialRampToValueAtTime(0.0006, t1);
	src.connect(bp); bp.connect(g); g.connect(voiceBus);
	src.start(t0); src.stop(t1 + 0.02);
	if (voiced) { // 有声摩擦音は低めの声帯音も少し混ぜる
		const o = makeGlottal(t0, t1, f0);
		const lp = actx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 1200;
		const vg = actx.createGain(); vg.gain.value = peak * 0.5;
		o.connect(lp); lp.connect(vg); vg.connect(voiceBus);
	}
}

// 子音を調音し、消費した時間（秒）を返す。pos: 'on'(頭) / 'co'(末)
function articulate(code, t0, slot, f0) {
	if (FRIC[code]) {
		const [fr, q, vo] = FRIC[code];
		noiseSeg(t0, slot, fr, q, vo ? 0.18 : 0.22, vo, f0);
	} else if (STOP[code]) {
		const [fr, vo] = STOP[code];
		// 破裂：頭はわずかな閉鎖のあと短いバースト
		const burst = Math.min(0.035, slot * 0.7);
		noiseSeg(t0 + Math.max(0, slot - burst), burst, fr, 2.5, vo ? 0.20 : 0.26, false, f0);
		if (vo) voicedFormant(t0, slot, f0, [[fr * 0.4, 4, 0.5]], 0.10);
	} else if (NASAL[code]) {
		voicedFormant(t0, slot, f0, NASAL[code], 0.5);
	} else if (LIQUID[code]) {
		voicedFormant(t0, slot, f0, LIQUID[code], 0.5);
	} else if (GLIDE[code]) {
		voicedFormant(t0, slot, f0, GLIDE[code], 0.45);
	} else if (code === 'h') {
		noiseSeg(t0, slot, 1200, 1.0, 0.10, false, f0); // 気息
	}
}

// 1音節（子音＋母音＋末子音）を歌う
function singSyllable(t0, dur, midi, n) {
	const f0 = midiToHz(midi);
	const onLen = n.on ? Math.min(0.10, Math.max(0.045, dur * 0.26)) : 0;
	const coLen = n.co ? Math.min(0.09, Math.max(0.04, dur * 0.22)) : 0;
	const vLen = Math.max(0.08, dur - onLen - coLen);
	if (n.on) articulate(n.on, t0, onLen, f0);
	singVowel(t0 + onLen, vLen, f0, n.v, 0.32);
	if (n.co) articulate(n.co, t0 + onLen + vLen, coLen, f0);
}

// 伴奏（やわらかいサイン：拍頭のベース＋3度下ハモリ）
const SCALE_PC = [7, 9, 11, 0, 2, 4, 6]; // G major
function thirdBelow(m) {
	const pc = ((m % 12) + 12) % 12, idx = SCALE_PC.indexOf(pc);
	if (idx < 0) return m - 4;
	let ni = idx - 2; while (ni < 0) ni += 7;
	let cand = Math.floor(m / 12) * 12 + SCALE_PC[ni];
	while (cand >= m) cand -= 12;
	while (m - cand > 5) cand += 12; while (m - cand < 2) cand -= 12;
	return cand;
}
function accompTone(t0, dur, midi, gain) {
	const o = actx.createOscillator(); o.type = "sine";
	o.frequency.setValueAtTime(midiToHz(midi), t0);
	const g = actx.createGain();
	g.gain.setValueAtTime(0.0001, t0);
	g.gain.exponentialRampToValueAtTime(gain, t0 + 0.03);
	g.gain.setValueAtTime(gain, t0 + dur * 0.8);
	g.gain.exponentialRampToValueAtTime(0.0006, t0 + dur);
	o.connect(g); g.connect(accompBus);
	o.start(t0); o.stop(t0 + dur + 0.05);
}

// 楽曲を丸ごとスケジュール
function scheduleSong() {
	const startAt = actx.currentTime + 0.15;
	let t = startAt, total = 0, idx = 0;
	for (const n of SONG) {
		const beats = n.b != null ? n.b : n.r;
		if (n.p == null) { t += beats * BEAT; total += beats * BEAT; continue; }
		const dur = beats * BEAT * TEMPO_GAP;
		singSyllable(t, dur, n.p, n);
		// 伴奏：ハモリ（控えめ）＋強拍にベース
		accompTone(t, dur, thirdBelow(n.p), 0.05);
		if (beats >= 2) accompTone(t, beats * BEAT * 1.1, n.p - 24, 0.07);
		lyricEvents.push({ at: t - startAt, midi: n.p, vowel: n.v, idx });
		idx++;
		t += beats * BEAT; total += beats * BEAT;
	}
	songStartCtxTime = startAt; songDuration = total;
	return total;
}

// ---- 再生制御 -----------------------------------------------------------
function startSinging() {
	lyricEvents = [];
	playing = true;
	scheduleSong();
	songTimer = setTimeout(() => {
		playing = false;
		if (!stoppedByUser) startSinging();
	}, (songDuration + 1.6) * 1000);
}
function start() {
	ensureAudio();
	if (actx.state === "suspended") actx.resume();
	if (playing) return;
	stoppedByUser = false;
	overlay.classList.add("hidden"); hint.classList.add("show");
	startSinging();
}
function stop() {
	stoppedByUser = true; playing = false;
	clearTimeout(songTimer);
	if (master) {
		master.gain.cancelScheduledValues(actx.currentTime);
		master.gain.setValueAtTime(master.gain.value, actx.currentTime);
		master.gain.linearRampToValueAtTime(0.0, actx.currentTime + 0.2);
		setTimeout(() => { if (master) master.gain.setValueAtTime(0.9, actx.currentTime); }, 260);
	}
	overlay.classList.remove("hidden"); hint.classList.remove("show");
	lyricEvents = [];
}
function toggle() { if (playing) stop(); else start(); }

window.addEventListener("pointerdown", () => toggle());
window.addEventListener("keydown", (e) => {
	if (e.code === "Space" || e.code === "Enter") { e.preventDefault(); toggle(); }
	else if (e.key === "a" || e.key === "A") {
		accompOn = !accompOn;
		if (accompBus) accompBus.gain.setTargetAtTime(accompOn ? 0.10 : 0.0, actx.currentTime, 0.05);
	}
});

// ---- 可視化 -------------------------------------------------------------
const stars = [];
for (let i = 0; i < 120; i++) stars.push({ x: Math.random(), y: Math.random(), z: Math.random() * 0.8 + 0.2, tw: Math.random() * 6.28 });
let bgPhase = 0;

function currentLyricIdx(elapsed) {
	let idx = -1;
	for (const ev of lyricEvents) { if (ev.at <= elapsed) idx = ev.idx; else break; }
	return idx;
}

function draw() {
	requestAnimationFrame(draw);
	ctx.fillStyle = reduceMotion ? "#05040e" : "rgba(5,4,14,0.22)";
	ctx.fillRect(0, 0, W, H);

	let level = 0, bass = 0, treble = 0;
	if (analyser) {
		analyser.getByteFrequencyData(freqData);
		analyser.getByteTimeDomainData(timeData);
		const n = freqData.length;
		for (let i = 0; i < n; i++) {
			const v = freqData[i] / 255;
			if (i < n * 0.08) bass += v; else if (i > n * 0.4) treble += v;
			level += v;
		}
		level /= n; bass /= (n * 0.08); treble /= (n * 0.6);
	}
	formantTrack.level += (level - formantTrack.level) * 0.3;
	bgPhase += reduceMotion ? 0.001 : 0.005 + level * 0.02;

	const cx = W / 2, cy = H * 0.5;

	// 背景グロー
	const glowR = Math.max(W, H) * (0.4 + bass * 0.4);
	const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
	const hue = (bgPhase * 16) % 360;
	g.addColorStop(0, "hsla(" + hue + ",75%," + (10 + level * 28) + "%,0.5)");
	g.addColorStop(0.55, "hsla(" + ((hue + 60) % 360) + ",65%,9%,0.22)");
	g.addColorStop(1, "rgba(5,4,14,0)");
	ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

	// 星
	for (const s of stars) {
		s.tw += 0.02;
		const a = (0.2 + (0.5 + 0.5 * Math.sin(s.tw)) * 0.6) * s.z;
		ctx.fillStyle = "rgba(200,220,255," + a.toFixed(3) + ")";
		const sz = s.z * 1.7 * (1 + treble * 0.5);
		ctx.fillRect(s.x * W, s.y * H, sz, sz);
	}

	// 声帯波形リング（実際に出ている声の波形）
	if (analyser) {
		const baseR = Math.min(W, H) * 0.17;
		ctx.save(); ctx.translate(cx, cy * 0.96);
		ctx.beginPath();
		const step = Math.max(1, Math.floor(timeData.length / 220));
		let first = true;
		for (let i = 0; i < timeData.length; i += step) {
			const amp = (timeData[i] - 128) / 128;
			const ang = (i / timeData.length) * Math.PI * 2;
			const r = baseR + amp * (40 + bass * 36);
			const x = Math.cos(ang) * r, y = Math.sin(ang) * r;
			if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
		}
		ctx.closePath();
		ctx.strokeStyle = "hsla(" + ((hue + 180) % 360) + ",100%,76%,0.9)";
		ctx.lineWidth = 2; ctx.shadowColor = "hsla(" + ((hue + 180) % 360) + ",100%,70%,0.8)";
		ctx.shadowBlur = 16 + bass * 26; ctx.stroke();
		ctx.restore();

		// 口（母音の開き = F1 と音量に連動する楕円）
		const elapsed = playing && actx ? (actx.currentTime - songStartCtxTime) : 0;
		const li = currentLyricIdx(elapsed);
		const ev = li >= 0 ? lyricEvents.find((e) => e.idx === li) : null;
		const vk = ev ? (DIPH[ev.vowel] ? DIPH[ev.vowel][0] : ev.vowel) : 'L';
		const F1 = (VOWELS[vk] || VOWELS.L)[0][0];
		formantTrack.F1 += (F1 - formantTrack.F1) * 0.2;
		const open = (formantTrack.F1 - 250) / 500; // 0..~1
		const amp = 0.6 + formantTrack.level * 6;
		const mw = Math.min(W, H) * (0.05 + 0.03 / Math.max(0.3, amp));
		const mh = Math.min(W, H) * (0.012 + 0.06 * Math.min(1.2, open) * Math.min(1, amp));
		ctx.save(); ctx.translate(cx, cy * 0.96);
		ctx.fillStyle = "rgba(20,8,24,0.85)";
		ctx.strokeStyle = "hsla(" + ((hue + 20) % 360) + ",90%,72%," + (0.5 + level) + ")";
		ctx.lineWidth = 3; ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 18;
		ctx.beginPath(); ctx.ellipse(0, 0, mw, mh, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
		ctx.restore();
	}

	// カラオケ歌詞（現在の音節を強調表示）
	if (playing && actx) {
		const elapsed = actx.currentTime - songStartCtxTime;
		const li = currentLyricIdx(elapsed);
		// 現在のフレーズ（前後の単語を並べて、当該をハイライト）
		const words = [];
		let curPos = -1;
		for (let i = 0; i < SONG.length; i++) {
			if (SONG[i].p == null) continue;
			words.push({ idx: words.length, t: SONG[i].t });
		}
		// idx は休符を含まない通し番号なので words と整合
		const line = [];
		const span = 5;
		for (let k = li - span; k <= li + span; k++) {
			if (k >= 0 && k < words.length) line.push({ t: words[k].t, active: k === li });
		}
		ctx.save();
		ctx.textAlign = "center"; ctx.textBaseline = "middle";
		const baseFs = Math.min(W, H) * 0.052;
		let totalW = 0;
		ctx.font = "700 " + baseFs + "px 'Segoe UI', system-ui, sans-serif";
		for (const w of line) totalW += ctx.measureText(w.t + " ").width * (w.active ? 1.25 : 1);
		let x = cx - totalW / 2;
		const ty = H * 0.84;
		for (const w of line) {
			const fs = baseFs * (w.active ? 1.25 : 1);
			ctx.font = "700 " + fs + "px 'Segoe UI', system-ui, sans-serif";
			const ww = ctx.measureText(w.t + " ").width;
			if (w.active) {
				ctx.shadowColor = "hsla(" + ((hue + 200) % 360) + ",100%,72%,0.95)";
				ctx.shadowBlur = 22;
				const grad = ctx.createLinearGradient(x, ty, x + ww, ty);
				grad.addColorStop(0, "#bfe9ff"); grad.addColorStop(0.5, "#fff"); grad.addColorStop(1, "#ffd9f3");
				ctx.fillStyle = grad;
			} else { ctx.shadowBlur = 0; ctx.fillStyle = "rgba(190,205,255,0.42)"; }
			ctx.fillText(w.t, x + ww / 2, ty);
			x += ww;
		}
		ctx.restore();

		// タイトル
		ctx.save();
		ctx.textAlign = "center";
		ctx.font = "600 " + Math.min(W, H) * 0.026 + "px 'Segoe UI', system-ui, sans-serif";
		ctx.fillStyle = "rgba(220,230,255," + (0.45 + level * 0.3) + ")";
		ctx.fillText("Daisy Bell — singing by formant synthesis", cx, H * 0.1);
		ctx.restore();
	}
}
draw();
if (reduceMotion) { ctx.fillStyle = "#05040e"; ctx.fillRect(0, 0, W, H); }
</script>
</body>
