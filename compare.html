<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ChatGPT vs Claude デモ比較</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: "Segoe UI", Arial, sans-serif;
			background: #1a1a2e;
			color: #fff;
			height: 100vh;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}
		header {
			display: flex;
			align-items: center;
			padding: 8px 16px;
			background: #16213e;
			border-bottom: 1px solid #0f3460;
			gap: 16px;
			flex-shrink: 0;
		}
		header a {
			color: #a8b2d1;
			text-decoration: none;
			font-size: 14px;
			white-space: nowrap;
		}
		header a:hover { color: #fff; }
		#demo-title {
			font-size: 16px;
			font-weight: bold;
			color: #e2e8f0;
			flex: 1;
			text-align: center;
		}
		.tab-bar {
			display: flex;
			background: #16213e;
			border-bottom: 2px solid #0f3460;
			flex-shrink: 0;
		}
		.tab {
			padding: 10px 24px;
			border: none;
			background: transparent;
			color: #a8b2d1;
			font-size: 15px;
			font-weight: bold;
			cursor: pointer;
			position: relative;
			transition: all 0.2s;
		}
		.tab:hover { color: #fff; background: rgba(255,255,255,0.05); }
		.tab.active-chatgpt {
			color: #10a37f;
			background: rgba(16, 163, 127, 0.1);
		}
		.tab.active-chatgpt::after {
			content: "";
			position: absolute;
			bottom: -2px;
			left: 0;
			right: 0;
			height: 3px;
			background: #10a37f;
		}
		.tab.active-claude {
			color: #d4a27f;
			background: rgba(212, 162, 127, 0.1);
		}
		.tab.active-claude::after {
			content: "";
			position: absolute;
			bottom: -2px;
			left: 0;
			right: 0;
			height: 3px;
			background: #d4a27f;
		}
		.tab.active-codex {
			color: #38bdf8;
			background: rgba(56, 189, 248, 0.12);
		}
		.tab.active-codex::after {
			content: "";
			position: absolute;
			bottom: -2px;
			left: 0;
			right: 0;
			height: 3px;
			background: #38bdf8;
		}
		.tab.active-reason {
			color: #f59e0b;
			background: rgba(245, 158, 11, 0.12);
		}
		.tab.active-reason::after {
			content: "";
			position: absolute;
			bottom: -2px;
			left: 0;
			right: 0;
			height: 3px;
			background: #f59e0b;
		}
		.tab.active-claude48 {
			color: #f0a868;
			background: rgba(240, 168, 104, 0.12);
		}
		.tab.active-claude48::after {
			content: "";
			position: absolute;
			bottom: -2px;
			left: 0;
			right: 0;
			height: 3px;
			background: #f0a868;
		}
		.iframe-container {
			flex: 1;
			position: relative;
		}
		.demo-frame {
			width: 100%;
			height: 100%;
			border: none;
			display: none;
			position: absolute;
			top: 0;
			left: 0;
		}
		.demo-frame.active { display: block; }
		.coming-soon {
			display: none;
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: #1a1a2e;
			color: #a8b2d1;
			font-size: 24px;
			justify-content: center;
			align-items: center;
			flex-direction: column;
			gap: 12px;
		}
		.coming-soon.active { display: flex; }
		/* 共有ボタン */
		.share-btn {
			border: 1px solid #0f3460; background: rgba(120,140,255,0.10); color: #cdd6f4;
			font-size: 13px; font-weight: bold; padding: 6px 14px; border-radius: 8px; cursor: pointer;
			white-space: nowrap; transition: all 0.15s;
		}
		.share-btn:hover { background: rgba(120,140,255,0.22); color: #fff; }
		.share-btn:disabled { opacity: 0.4; cursor: default; }
		/* 共有ポップオーバー */
		.share-pop {
			position: fixed; top: 46px; right: 12px; z-index: 100;
			width: min(92vw, 470px); background: #16213e; border: 1px solid #2a3f6a;
			border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.55); padding: 14px;
			display: none; flex-direction: column; gap: 12px;
		}
		.share-pop.open { display: flex; }
		.share-row { display: flex; flex-direction: column; gap: 5px; }
		.share-label { font-size: 12px; color: #a8b2d1; }
		.share-inline { display: flex; gap: 6px; }
		.share-input {
			flex: 1; min-width: 0; font-size: 12px; padding: 7px 9px; border-radius: 7px;
			border: 1px solid #2a3f6a; background: #0f1830; color: #e2e8f0;
		}
		.share-copy {
			border: none; background: #4f6bed; color: #fff; font-size: 12px; font-weight: bold;
			padding: 7px 12px; border-radius: 7px; cursor: pointer; white-space: nowrap;
		}
		.share-copy:hover { background: #5f79f5; }
		/* コピー完了トースト */
		.share-toast {
			position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px);
			background: #2ecc71; color: #062b14; font-weight: bold; font-size: 13px;
			padding: 9px 20px; border-radius: 999px; z-index: 110; opacity: 0; pointer-events: none;
			transition: opacity 0.25s, transform 0.25s;
		}
		.share-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
	</style>
</head>
<body>
	<header>
		<a href="./index.html">&larr; メニューに戻る</a>
		<span id="demo-title"></span>
		<button id="share-btn" class="share-btn" onclick="toggleShare(event)">🔗 共有</button>
	</header>

	<!-- 共有ポップオーバー：表示中のデモ単体のリンクと、比較ページのリンクをコピーできる -->
	<div id="share-pop" class="share-pop">
		<div class="share-row" id="share-row-solo">
			<div class="share-label">このデモ単体のリンク（<span id="share-tab-name">—</span>版）</div>
			<div class="share-inline">
				<input id="share-url-solo" class="share-input" readonly>
				<button class="share-copy" data-target="share-url-solo">コピー</button>
			</div>
		</div>
		<div class="share-row">
			<div class="share-label">比較ページのリンク（このタブで開く）</div>
			<div class="share-inline">
				<input id="share-url-compare" class="share-input" readonly>
				<button class="share-copy" data-target="share-url-compare">コピー</button>
			</div>
		</div>
	</div>
	<div id="share-toast" class="share-toast">リンクをコピーしました</div>
	<div class="tab-bar">
		<button class="tab active-chatgpt" id="tab-chatgpt" onclick="switchTab('chatgpt')">ChatGPT</button>
		<button class="tab" id="tab-claude" onclick="switchTab('claude')">Claude Opus 4.6</button>
		<button class="tab" id="tab-codex" onclick="switchTab('codex')">ChatGPT-5.3-Codex</button>
		<button class="tab" id="tab-claude48" onclick="switchTab('claude48')">Claude Opus 4.8</button>
		<button class="tab" id="tab-reason" onclick="switchTab('reason')">見送り理由</button>
	</div>
		<div class="iframe-container">
		<iframe id="chatgpt-frame" class="demo-frame active"></iframe>
		<iframe id="claude-frame" class="demo-frame"></iframe>
		<iframe id="codex-frame" class="demo-frame"></iframe>
		<iframe id="claude48-frame" class="demo-frame"></iframe>
		<iframe id="reason-frame" class="demo-frame"></iframe>
		<div id="coming-soon" class="coming-soon">
			<div id="coming-soon-title">準備中...</div>
			<div id="coming-soon-detail" style="font-size:14px;color:#666">このデモのClaude版はまだ作成されていません</div>
		</div>
	</div>
	<script>
		const DEFAULT_CODEX_REASON = "このデモのChatGPT-5.3-Codex版は未対応です。実装規模が大きいため、今回は見送りました。";
		const DEFERRED_CODEX_DEMOS = {
			"wiz2": "3Dダンジョン表現の再実装は大規模なため、今回は見送りました。",
			"particles": "描画とパラメータ編集機構の再構築が大規模なため、今回は見送りました。",
			"rpg": "マップ・戦闘・状態管理が絡み、短時間での品質担保が難しいため見送りました。",
		};

		function buildDeferredCodexUrl(config, demoId) {
			const reason = DEFERRED_CODEX_DEMOS[demoId] || DEFAULT_CODEX_REASON;
			const name = config?.title || demoId || "不明";
			return `./codex-deferred.html?name=${encodeURIComponent(name)}&reason=${encodeURIComponent(reason)}`;
		}

		const MISSING_VERSION_MESSAGES = {
			"side-scroller": {
				chatgpt: "このデモのChatGPT版は存在しません",
			},
		};

		const DEMO_CONFIG = {
			"matrix": { title: "Digital Rain Matrix", chatgpt: "./matrix.html", claude: "./claude/matrix.html", codex: "./codex-matrix.html", claude48: "./claude48/matrix.html" },
			"snow": { title: "Falling Snowflakes", chatgpt: "./snow.html", claude: "./claude/snow.html", codex: "./codex-snow.html", claude48: "./claude48/snow.html" },
			"roaming-cockroaches": { title: "Roaming Cockroaches", chatgpt: "./roaming-cockroaches.html", claude: "./claude/roaming-cockroaches.html", codex: "./codex-roaming-cockroaches.html", claude48: "./claude48/roaming-cockroaches.html" },
			"mandelbrot-slow": { title: "Mandelbrot Explorer Part.1", chatgpt: "./mandelbrot-slow.html", claude: "./claude/mandelbrot-slow.html", codex: "./codex-mandelbrot-slow.html", claude48: "./claude48/mandelbrot-slow.html" },
			"mandelbrot-slow2": { title: "Mandelbrot Explorer Part.2", chatgpt: "./mandelbrot-slow2.html", claude: "./claude/mandelbrot-slow2.html", codex: "./codex-mandelbrot-slow2.html", claude48: "./claude48/mandelbrot-slow2.html" },
			"mandelbrot-ol": { title: "Mandelbrot OpenLayers", chatgpt: "./mandelbrot-ol.html", claude: "./claude/mandelbrot-ol.html", codex: "./codex-mandelbrot-ol.html", claude48: "./claude48/mandelbrot-ol.html" },
			"linedemo": { title: "Dynamic Colorful Lines", chatgpt: "./linedemo.html", claude: "./claude/linedemo.html", codex: "./codex-linedemo.html", claude48: "./claude48/linedemo.html" },
			"thunder": { title: "Electrifying Thunderstorm", chatgpt: "./thunder.html", claude: "./claude/thunder.html", codex: "./codex-thunder.html", claude48: "./claude48/thunder.html" },
			"water-ripples1": { title: "Water Ripples Simulation Part.1", chatgpt: "./water-ripples1.html", claude: "./claude/water-ripples1.html", codex: "./codex-water-ripples1.html", claude48: "./claude48/water-ripples1.html" },
			"water-ripples2": { title: "Water Ripples Simulation Part.2", chatgpt: "./water-ripples2.html", claude: "./claude/water-ripples2.html", codex: "./codex-water-ripples2.html", claude48: "./claude48/water-ripples2.html" },
			"balls": { title: "Bouncing Colorful Balls", chatgpt: "./balls.html", claude: "./claude/balls.html", codex: "./codex-balls.html", claude48: "./claude48/balls.html" },
			"cool-design": { title: "Cool Design Showcase", chatgpt: "./cool-design.html", claude: "./claude/cool-design.html", codex: "./codex-cool-design.html", claude48: "./claude48/cool-design.html" },
			"retro-1980s-homepage": { title: "1980s Retro Homepage", chatgpt: "./retro-1980s-homepage.html", claude: "./claude/retro-1980s-homepage.html", codex: "./codex-retro-1980s-homepage.html", claude48: "./claude48/retro-1980s-homepage.html" },
			"space-travel-demo": { title: "Space Travel Demo Part.1", chatgpt: "./space-travel-demo.html", claude: "./claude/space-travel-demo.html", codex: "./codex-space-travel-demo.html", claude48: "./claude48/space-travel-demo.html" },
			"space-travel-demo2": { title: "Space Travel Demo Part.2", chatgpt: "./space-travel-demo2.html", claude: "./claude/space-travel-demo2.html", codex: "./codex-space-travel-demo2.html", claude48: "./claude48/space-travel-demo2.html" },
			"stereogram-demo": { title: "Stereogram Demo", chatgpt: "./stereogram-demo.html", claude: "./claude/stereogram-demo.html", codex: "./codex-stereogram-demo.html", claude48: "./claude48/stereogram-demo.html" },
			"chaos-curve-demo": { title: "Chaos Curve Demo", chatgpt: "./chaos-curve-demo.html", claude: "./claude/chaos-curve-demo.html", codex: "./codex-chaos-curve-demo.html", claude48: "./claude48/chaos-curve-demo.html" },
			"megademo-style-demo": { title: "MegaDemo Style Demo", chatgpt: "./megademo-style-demo.html", claude: "./claude/megademo-style-demo.html", codex: "./codex-megademo-style-demo.html", claude48: "./claude48/megademo-style-demo.html" },
			"daisy-bell-music-demo": { title: "Daisy Bell Music Demo", chatgpt: "./daisy-bell-music-demo.html", claude: "./claude/daisy-bell-music-demo.html", codex: "./codex-daisy-bell-music-demo.html", claude48: "./claude48/daisy-bell-music-demo.html" },
			"lorenz-attractor-demo": { title: "Lorenz Attractor Demo", chatgpt: "./lorenz-attractor-demo.html", claude: "./claude/lorenz-attractor-demo.html", codex: "./codex-lorenz-attractor-demo.html", claude48: "./claude48/lorenz-attractor-demo.html" },
			"picture-book": { title: "Picture Book", chatgpt: "./picture-book.html", claude: "./claude/picture-book.html", codex: "./codex-picture-book.html", claude48: "./claude48/picture-book.html" },
			"tetris": { title: "Tetris (PixiJS)", chatgpt: "./tetris.html", claude: "./claude/tetris.html", codex: "./codex-tetris.html", claude48: "./claude48/tetris.html" },
			"yaruo": { title: "やる夫AA生成（2chやる夫をAAで再現）", chatgpt: "./yaruo.html", claude: "./claude/yaruo.html", codex: "./codex-yaruo.html", claude48: "./claude48/yaruo.html" },
			"wiz": { title: "Wizardry Dungeon", chatgpt: "./wiz.html", claude: "./claude/wiz.html", codex: "./codex-wiz.html", claude48: "./claude48/wiz.html" },
			"wiz2": { title: "Wizardry 3D Dungeon", chatgpt: "./wiz2.html", claude: "./claude/wiz2.html", claude48: "./claude48/wiz2.html" },
			"particles": { title: "Particle Editor", chatgpt: "./particles.html", claude: "./claude/particles.html", claude48: "./claude48/particles.html" },
			"rpg": { title: "Retro RPG", chatgpt: "./rpg.html", claude: "./claude/rpg.html", claude48: "./claude48/rpg.html" },
			"tet": { title: "Tetris (Simple)", chatgpt: "./tet.html", claude: "./claude/tet.html", codex: "./codex-tet.html", claude48: "./claude48/tet.html" },
			"shoot": { title: "Shooting Game", chatgpt: "./shoot.html", claude: "./claude/shoot.html", codex: "./codex-shoot.html", claude48: "./claude48/shoot.html" },
			"cubes": { title: "Rotating Cubes", chatgpt: "./cubes.html", claude: "./claude/cubes.html", codex: "./codex-cubes.html", claude48: "./claude48/cubes.html" },
			"side-scroller": {
				title: "Side-Scroller Action Game",
				chatgpt: "",
				claude: "./side-scroller.html",
				codex: "./side-scroller-codex.html",
				claude48: "./claude48/side-scroller.html",
			},
		};

		const params = new URLSearchParams(window.location.search);
		const demoId = params.get("demo");
		const config = DEMO_CONFIG[demoId];

		// 各タブで読み込むURLを保持する。iframe の src は「初回にそのタブを開いた時」に
		// 初めて設定する（＝遅延ロード）。こうしないと、非表示(display:none)の iframe 内で
		// デモが初期化され、canvas が 0×0 になる・requestAnimationFrame が止まる、といった
		// 理由でゲームやアニメが真っ暗／無反応になる不具合が起きる。
		const FRAME_URLS = {};

		if (config) {
			document.getElementById("demo-title").textContent = config.title;
			document.title = config.title + " - ChatGPT vs Claude";
			FRAME_URLS.chatgpt = config.chatgpt || null;
			FRAME_URLS.claude = config.claude || null;
			FRAME_URLS.claude48 = config.claude48 || null;
			// Codex は実装版が無ければ「見送り理由」ページを表示するため常にURLを持つ
			FRAME_URLS.codex = config.codex || buildDeferredCodexUrl(config, demoId);
			FRAME_URLS.reason = null;

			const labels = config.labels || { primary: "ChatGPT", secondary: "Claude Opus 4.6", tertiary: "ChatGPT-5.3-Codex", quaternary: "見送り理由", quinary: "Claude Opus 4.8" };
			document.getElementById("tab-chatgpt").textContent = labels.primary;
			document.getElementById("tab-claude").textContent = labels.secondary;
			document.getElementById("tab-codex").textContent = labels.tertiary || "ChatGPT-5.3-Codex";
			document.getElementById("tab-claude48").textContent = labels.quinary || "Claude Opus 4.8";
			document.getElementById("tab-reason").textContent = labels.quaternary || "見送り理由";
			document.getElementById("tab-codex").style.display = "";
			// 見送り理由タブは常に非表示（Codexタブ自体が見送りページを兼ねるため不要）
			document.getElementById("tab-reason").style.display = "none";
		} else {
			document.getElementById("demo-title").textContent = "デモが見つかりません";
		}

		let currentTab = "chatgpt";
		// ?tab= が付いていれば、その版を初期表示にする（共有リンクからの遷移用）
		const tabParam = params.get("tab");
		if (config && tabParam && ["chatgpt", "claude", "claude48", "codex"].includes(tabParam) && hasSource(tabParam)) {
			currentTab = tabParam;
		}

		function showComingSoon(message) {
			const comingSoon = document.getElementById("coming-soon");
			const title = document.getElementById("coming-soon-title");
			const detail = document.getElementById("coming-soon-detail");
			title.textContent = "未対応";
			detail.textContent = message;
			comingSoon.classList.add("active");
		}

		function hideComingSoon() {
			document.getElementById("coming-soon").classList.remove("active");
		}

		function hasSource(tab) {
			if (!config) return false;
			if (tab === "reason") return true;
			return Boolean(FRAME_URLS[tab]);
		}

		function getMissingMessage(tab) {
			const names = { chatgpt: "ChatGPT", claude: "Claude Opus 4.6", claude48: "Claude Opus 4.8", codex: "ChatGPT-5.3-Codex" };
			return MISSING_VERSION_MESSAGES[demoId]?.[tab]
				|| `このデモの${names[tab] || tab}版はまだ作成されていません`;
		}

		// タブ定義（フレーム・タブ要素・アクティブ時のクラスを一元管理）
		const TAB_DEFS = {
			chatgpt: { frame: "chatgpt-frame", tab: "tab-chatgpt", activeClass: "active-chatgpt" },
			claude: { frame: "claude-frame", tab: "tab-claude", activeClass: "active-claude" },
			claude48: { frame: "claude48-frame", tab: "tab-claude48", activeClass: "active-claude48" },
			codex: { frame: "codex-frame", tab: "tab-codex", activeClass: "active-codex" },
			reason: { frame: "reason-frame", tab: "tab-reason", activeClass: "active-reason" },
		};

		function switchTab(tab) {
			currentTab = tab;

			// すべてのフレーム・タブを非アクティブ化
			for (const def of Object.values(TAB_DEFS)) {
				document.getElementById(def.frame).classList.remove("active");
				document.getElementById(def.tab).className = "tab";
			}

			const def = TAB_DEFS[tab];
			if (!def) return;
			document.getElementById(def.tab).classList.add(def.activeClass);

			const frame = document.getElementById(def.frame);
			// 見送り理由タブは常に表示。それ以外はソースの有無で判定
			if (tab === "reason" || hasSource(tab)) {
				// 遅延ロード：このタブを初めて開いた時にだけ src を設定する。
				// 先に active（display:block）にして frame を可視化してから src を
				// 設定することで、デモ側が正しい画面サイズで初期化でき、
				// 真っ暗・無反応（canvas 0×0 / rAF 停止）を防げる。
				frame.classList.add("active");
				const url = FRAME_URLS[tab];
				if (url && !frame.getAttribute("src")) frame.src = url;
				hideComingSoon();
				setTimeout(() => frame.contentWindow?.focus(), 50);
			} else {
				showComingSoon(getMissingMessage(tab));
			}

			// アドレスバーを現在のタブに同期（リロードや共有で同じ表示を再現できる）
			if (config && demoId) {
				try {
					const base = location.href.split("?")[0].split("#")[0];
					history.replaceState(null, "", `${base}?demo=${encodeURIComponent(demoId)}&tab=${encodeURIComponent(tab)}`);
				} catch (e) { /* file:// 等で失敗しても無視 */ }
			}
			// 共有ポップオーバーが開いていればリンク内容を更新
			const sharePop = document.getElementById("share-pop");
			if (sharePop && sharePop.classList.contains("open") && typeof refreshShareUrls === "function") refreshShareUrls();
		}

		switchTab(currentTab);

		// =====================================================================
		// 共有：表示中のデモのリンクをコピーできるようにする
		// =====================================================================
		const TAB_DISPLAY = { chatgpt: "ChatGPT", claude: "Claude Opus 4.6", codex: "ChatGPT-5.3-Codex", claude48: "Claude Opus 4.8" };

		// 表示中タブのデモ単体（HTML直リンク）の絶対URL。単体が無ければ null
		function soloUrl() {
			const u = FRAME_URLS[currentTab];
			if (!u) return null;
			try { return new URL(u, location.href).href; } catch (e) { return null; }
		}
		// このデモ＋タブを再現する比較ページのURL
		function compareUrl() {
			const base = location.href.split("?")[0].split("#")[0];
			return `${base}?demo=${encodeURIComponent(demoId)}&tab=${encodeURIComponent(currentTab)}`;
		}

		function refreshShareUrls() {
			const soloRow = document.getElementById("share-row-solo");
			const soloInput = document.getElementById("share-url-solo");
			const solo = soloUrl();
			if (solo) {
				soloInput.value = solo;
				document.getElementById("share-tab-name").textContent = TAB_DISPLAY[currentTab] || currentTab;
				soloRow.style.display = "";
			} else {
				// 単体ページが存在しない版（例: side-scroller の ChatGPT）は隠す
				soloRow.style.display = "none";
			}
			document.getElementById("share-url-compare").value = compareUrl();
		}

		function toggleShare(ev) {
			ev.stopPropagation();
			const pop = document.getElementById("share-pop");
			if (pop.classList.contains("open")) { pop.classList.remove("open"); return; }
			if (!config) return;
			refreshShareUrls();
			pop.classList.add("open");
		}

		// ポップオーバー外クリックで閉じる
		document.addEventListener("click", (e) => {
			const pop = document.getElementById("share-pop");
			if (!pop.classList.contains("open")) return;
			if (!pop.contains(e.target) && e.target.id !== "share-btn") pop.classList.remove("open");
		});

		let toastTimer = 0;
		function showToast() {
			const t = document.getElementById("share-toast");
			t.classList.add("show");
			clearTimeout(toastTimer);
			toastTimer = setTimeout(() => t.classList.remove("show"), 1500);
		}

		// コピー：Clipboard API → 失敗時は execCommand にフォールバック
		document.querySelectorAll(".share-copy").forEach((btn) => {
			btn.addEventListener("click", async () => {
				const input = document.getElementById(btn.dataset.target);
				input.focus();
				input.select();
				input.setSelectionRange(0, input.value.length);
				let ok = false;
				try {
					if (navigator.clipboard && navigator.clipboard.writeText) {
						await navigator.clipboard.writeText(input.value);
						ok = true;
					}
				} catch (e) { /* secure context 以外では失敗するのでフォールバックへ */ }
				if (!ok) { try { ok = document.execCommand("copy"); } catch (e) {} }
				showToast();
			});
		});
	</script>
</body>
</html>
