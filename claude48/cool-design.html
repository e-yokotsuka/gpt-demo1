<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="ai.author" content="Claude Opus 4.8">
<meta name="ai.model" content="claude-opus-4-8">
<meta name="ai.note" content="Generated by Claude Opus 4.8.">
<title>Cool Design Showcase - Claude Opus 4.8版</title>
<style>
	/*
	 * Cool Design Showcase — Claude Opus 4.8 オリジナル版
	 * 既存3版（ChatGPT/Codex/Opus 4.6）のテーマ（クールな未来的デザイン showcase）を踏襲しつつ、
	 * - キャンバスによる滑らかなオーロラ＋粒子コンステレーション背景（GPU負荷を抑える設計）
	 * - DOM 側はガラス調パネルに鮮明なタイポグラフィを置き、文字の輪郭を保つ
	 * という「キャンバス背景 × DOM前景」のハイブリッド構成で視覚的完成度を底上げする。
	 * 外部CDN・外部フォントは一切使わず、システムフォントのみで自己完結。
	 */
	:root {
		--bg-0: #05060f;
		--bg-1: #0a0a1e;
		--ink: #f4f7ff;
		--muted: #aab2d6;
		--c1: #ff2e88;  /* マゼンタ */
		--c2: #8a5bff;  /* バイオレット */
		--c3: #2ec5ff;  /* シアン */
		--c4: #ffd166;  /* ゴールド（Claude アクセント） */
		--line: rgba(160, 190, 255, 0.16);
		--glass: rgba(14, 18, 40, 0.42);
	}
	* { margin: 0; padding: 0; box-sizing: border-box; }
	html, body { width: 100%; height: 100%; }
	body {
		background: radial-gradient(120% 120% at 50% -10%, var(--bg-1), var(--bg-0) 70%);
		color: var(--ink);
		font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", system-ui, sans-serif;
		overflow: hidden;
		position: relative;
	}

	/* 背景キャンバス（オーロラ＋粒子）。前景より奥に固定配置。 */
	#scene {
		position: fixed;
		inset: 0;
		width: 100%;
		height: 100%;
		display: block;
		z-index: 0;
	}

	/* 微細なノイズ／グリッドのオーバーレイで質感を加える */
	.veil {
		position: fixed;
		inset: 0;
		pointer-events: none;
		z-index: 1;
		background-image:
			linear-gradient(rgba(150, 190, 255, 0.035) 1px, transparent 1px),
			linear-gradient(90deg, rgba(150, 190, 255, 0.035) 1px, transparent 1px);
		background-size: 44px 44px;
		mask-image: radial-gradient(circle at 50% 45%, #000 30%, transparent 78%);
		-webkit-mask-image: radial-gradient(circle at 50% 45%, #000 30%, transparent 78%);
	}

	/* 中央ステージ。100vw/100vh いっぱいに配置し中央寄せ。 */
	.stage {
		position: relative;
		z-index: 2;
		width: 100%;
		height: 100%;
		display: grid;
		place-items: center;
		padding: clamp(18px, 4vw, 48px);
	}

	/* ガラス調ショーケースパネル */
	.panel {
		position: relative;
		width: min(880px, 100%);
		border: 1px solid var(--line);
		border-radius: 22px;
		background: var(--glass);
		backdrop-filter: blur(18px) saturate(140%);
		-webkit-backdrop-filter: blur(18px) saturate(140%);
		box-shadow:
			0 30px 80px rgba(0, 0, 0, 0.55),
			inset 0 1px 0 rgba(255, 255, 255, 0.08);
		padding: clamp(28px, 5.5vw, 56px);
		overflow: hidden;
		/* 登場アニメーション */
		opacity: 0;
		transform: translateY(26px) scale(0.985);
		animation: rise 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
	}
	@keyframes rise {
		to { opacity: 1; transform: translateY(0) scale(1); }
	}

	/* パネル外周を流れる発光ボーダー（conic グラデーションを回転） */
	.panel::before {
		content: "";
		position: absolute;
		inset: -1px;
		border-radius: 22px;
		padding: 1px;
		background: conic-gradient(from 0deg,
			var(--c1), var(--c2), var(--c3), var(--c4), var(--c1));
		-webkit-mask:
			linear-gradient(#000 0 0) content-box,
			linear-gradient(#000 0 0);
		-webkit-mask-composite: xor;
		mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
		mask-composite: exclude;
		opacity: 0.55;
		animation: spin 9s linear infinite;
		pointer-events: none;
	}
	@keyframes spin { to { transform: rotate(360deg); } }

	/* パネル内の光だまり */
	.panel::after {
		content: "";
		position: absolute;
		width: 460px;
		height: 460px;
		right: -160px;
		top: -200px;
		border-radius: 50%;
		background: radial-gradient(circle, rgba(138, 91, 255, 0.28), transparent 68%);
		pointer-events: none;
	}

	.eyebrow {
		display: inline-flex;
		align-items: center;
		gap: 10px;
		font-size: clamp(11px, 1.6vw, 13px);
		letter-spacing: 0.34em;
		text-transform: uppercase;
		color: var(--muted);
		margin-bottom: 18px;
	}
	.eyebrow .dot {
		width: 8px; height: 8px; border-radius: 50%;
		background: var(--c3);
		box-shadow: 0 0 12px var(--c3);
		animation: blink 2.4s ease-in-out infinite;
	}
	@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

	h1 {
		font-weight: 800;
		font-size: clamp(40px, 9vw, 96px);
		line-height: 0.96;
		letter-spacing: -0.02em;
		text-wrap: balance;
		background: linear-gradient(100deg,
			var(--c1) 0%, var(--c2) 28%, var(--c3) 55%, var(--c4) 78%, var(--c1) 100%);
		background-size: 280% 100%;
		-webkit-background-clip: text;
		background-clip: text;
		-webkit-text-fill-color: transparent;
		color: transparent;
		filter: drop-shadow(0 6px 30px rgba(138, 91, 255, 0.35));
		animation: flow 9s ease-in-out infinite;
	}
	@keyframes flow {
		0%, 100% { background-position: 0% 50%; }
		50% { background-position: 100% 50%; }
	}

	.sub {
		font-size: clamp(15px, 2.5vw, 19px);
		line-height: 1.9;
		color: var(--muted);
		max-width: 60ch;
		margin-top: 22px;
	}

	.chips {
		display: flex;
		flex-wrap: wrap;
		gap: 10px;
		margin-top: 28px;
	}
	.chip {
		font-size: clamp(11px, 1.6vw, 13px);
		letter-spacing: 0.06em;
		padding: 7px 14px;
		border-radius: 999px;
		border: 1px solid var(--line);
		background: rgba(150, 190, 255, 0.06);
		color: #e9f0ff;
		transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
	}
	.chip:hover {
		transform: translateY(-3px);
		border-color: rgba(46, 197, 255, 0.6);
		background: rgba(46, 197, 255, 0.12);
	}

	/* アニメーション進捗バー（往復スウィープ） */
	.bar {
		position: relative;
		margin-top: 30px;
		height: 6px;
		border-radius: 999px;
		background: rgba(160, 190, 255, 0.14);
		overflow: hidden;
	}
	.bar i {
		position: absolute;
		inset: 0;
		width: 40%;
		border-radius: 999px;
		background: linear-gradient(90deg, var(--c3), var(--c2), var(--c1));
		box-shadow: 0 0 18px rgba(138, 91, 255, 0.6);
		animation: sweep 3.4s cubic-bezier(0.65, 0, 0.35, 1) infinite;
	}
	@keyframes sweep {
		0% { left: -42%; }
		50% { left: 102%; }
		50.01% { left: 102%; transform: scaleX(-1); }
		100% { left: -42%; transform: scaleX(-1); }
	}

	.meta {
		display: flex;
		justify-content: space-between;
		align-items: center;
		flex-wrap: wrap;
		gap: 12px;
		margin-top: 26px;
		padding-top: 18px;
		border-top: 1px solid var(--line);
		font-size: 12px;
		letter-spacing: 0.12em;
		color: var(--muted);
		text-transform: uppercase;
	}
	.meta strong { color: var(--c4); font-weight: 700; }

	/* 左下のモデル名バッジ（兄弟デモと統一） */
	.tag {
		position: fixed;
		left: 14px;
		bottom: 12px;
		z-index: 3;
		font-size: 11px;
		letter-spacing: 0.18em;
		color: rgba(170, 178, 214, 0.7);
		text-transform: uppercase;
		pointer-events: none;
		user-select: none;
		text-shadow: 0 0 10px rgba(46, 197, 255, 0.4);
	}

	/* prefers-reduced-motion：動きを止め、静的でも完成された見た目を保つ */
	@media (prefers-reduced-motion: reduce) {
		.panel, .panel::before, h1, .eyebrow .dot, .bar i {
			animation: none !important;
		}
		.panel { opacity: 1; transform: none; }
		.panel::before { opacity: 0.6; }
		h1 { background-position: 30% 50%; }
		.bar i { left: 30%; width: 45%; }
	}
</style>
</head>
<body>
	<canvas id="scene"></canvas>
	<div class="veil"></div>

	<div class="stage">
		<section class="panel">
			<span class="eyebrow"><span class="dot"></span>Design System · 2026</span>
			<h1>COOL DESIGN<br>SHOWCASE</h1>
			<p class="sub">
				オーロラのように流れる光、ガラス越しに浮かぶ前景、そして無限に巡る
				グラデーション・タイポグラフィ。動きと余白とコントラストを設計し尽くした、
				Claude Opus 4.8 によるデザインショーケースの決定版です。
			</p>
			<div class="chips">
				<span class="chip">Aurora Canvas</span>
				<span class="chip">Glassmorphism</span>
				<span class="chip">Gradient Type</span>
				<span class="chip">Constellation</span>
				<span class="chip">60fps</span>
			</div>
			<div class="bar"><i></i></div>
			<div class="meta">
				<span>Generated by <strong>Claude Opus 4.8</strong></span>
				<span>Single-file · No CDN</span>
			</div>
		</section>
	</div>

	<div class="tag">Claude Opus 4.8 · Cool Design</div>

	<script>
	(() => {
		"use strict";
		// 背景アニメーション本体。
		// 1) 数枚の「オーロラ」レイヤー（巨大なソフトな円）をゆっくり漂わせ、
		//    加算合成で重なり合う色のグラデーションを作る。
		// 2) その上に粒子の星座（近接粒子間に線を引く constellation）を薄く重ねる。
		// すべて2D Canvasで完結し、DPRを上限2に制限、blur描画を最小化して負荷を抑える。
		const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
		const canvas = document.getElementById("scene");
		const ctx = canvas.getContext("2d", { alpha: false });

		let W = 0, H = 0, DPR = 1;
		const rnd = (a, b) => a + Math.random() * (b - a);

		// --- オーロラのレイヤー定義（パレットは CSS と対応） ---
		const PALETTE = [
			[255, 46, 136],   // c1 マゼンタ
			[138, 91, 255],   // c2 バイオレット
			[46, 197, 255],   // c3 シアン
			[255, 209, 102],  // c4 ゴールド
		];
		let blobs = [];
		let particles = [];

		function buildBlobs() {
			const n = 5;
			blobs = [];
			for (let i = 0; i < n; i++) {
				const col = PALETTE[i % PALETTE.length];
				blobs.push({
					// 中心位置（0-1の相対座標）と漂う基準
					bx: rnd(0.1, 0.9),
					by: rnd(0.1, 0.9),
					// 楕円運動の振幅・速度・位相
					ax: rnd(0.08, 0.22),
					ay: rnd(0.08, 0.22),
					sx: rnd(0.05, 0.13) * (Math.random() < 0.5 ? -1 : 1),
					sy: rnd(0.05, 0.13) * (Math.random() < 0.5 ? -1 : 1),
					ph: rnd(0, Math.PI * 2),
					r: rnd(0.32, 0.55),   // 半径（短辺比）
					col,
				});
			}
		}

		function buildParticles() {
			// 画面面積に応じて粒子数を決定（上限あり＝大画面でも重くしない）
			const target = Math.min(110, Math.round((W * H) / 16000));
			particles = [];
			for (let i = 0; i < target; i++) {
				particles.push({
					x: Math.random() * W,
					y: Math.random() * H,
					vx: rnd(-0.18, 0.18),
					vy: rnd(-0.18, 0.18),
					rad: rnd(0.6, 1.8),
				});
			}
		}

		function resize() {
			DPR = Math.min(2, window.devicePixelRatio || 1);
			W = window.innerWidth;
			H = window.innerHeight;
			canvas.width = Math.round(W * DPR);
			canvas.height = Math.round(H * DPR);
			canvas.style.width = W + "px";
			canvas.style.height = H + "px";
			ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
			buildParticles();
		}

		function drawAurora(t) {
			const shortSide = Math.min(W, H);
			ctx.globalCompositeOperation = "lighter";
			for (const b of blobs) {
				const k = reduce ? 0 : t;
				const cx = (b.bx + Math.cos(k * b.sx + b.ph) * b.ax) * W;
				const cy = (b.by + Math.sin(k * b.sy + b.ph) * b.ay) * H;
				const r = b.r * shortSide;
				const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
				const [cr, cg, cb] = b.col;
				g.addColorStop(0, `rgba(${cr},${cg},${cb},0.42)`);
				g.addColorStop(0.5, `rgba(${cr},${cg},${cb},0.12)`);
				g.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
				ctx.fillStyle = g;
				ctx.beginPath();
				ctx.arc(cx, cy, r, 0, Math.PI * 2);
				ctx.fill();
			}
			ctx.globalCompositeOperation = "source-over";
		}

		function drawConstellation() {
			// 粒子の更新と近接線の描画。線は薄く、計算は O(n^2) だが n を抑制済み。
			const LINK = 130, LINK2 = LINK * LINK;
			for (const p of particles) {
				if (!reduce) { p.x += p.vx; p.y += p.vy; }
				// 端で巻き戻し（ラップ）
				if (p.x < -10) p.x = W + 10; else if (p.x > W + 10) p.x = -10;
				if (p.y < -10) p.y = H + 10; else if (p.y > H + 10) p.y = -10;
			}
			// 線
			ctx.lineWidth = 1;
			for (let i = 0; i < particles.length; i++) {
				const a = particles[i];
				for (let j = i + 1; j < particles.length; j++) {
					const b = particles[j];
					const dx = a.x - b.x, dy = a.y - b.y;
					const d2 = dx * dx + dy * dy;
					if (d2 < LINK2) {
						const alpha = (1 - d2 / LINK2) * 0.16;
						ctx.strokeStyle = `rgba(180,205,255,${alpha.toFixed(3)})`;
						ctx.beginPath();
						ctx.moveTo(a.x, a.y);
						ctx.lineTo(b.x, b.y);
						ctx.stroke();
					}
				}
			}
			// 粒子本体
			ctx.fillStyle = "rgba(210,225,255,0.55)";
			for (const p of particles) {
				ctx.beginPath();
				ctx.arc(p.x, p.y, p.rad, 0, Math.PI * 2);
				ctx.fill();
			}
		}

		function frame(now) {
			const t = now / 1000;
			// 背景ベースを毎フレーム塗り直す（残像なしのクリーンな合成）
			ctx.fillStyle = "#05060f";
			ctx.fillRect(0, 0, W, H);
			drawAurora(t);
			drawConstellation();
			if (!reduce) requestAnimationFrame(frame);
		}

		buildBlobs();
		resize();
		addEventListener("resize", resize);

		if (reduce) {
			// モーション抑制時：1フレームだけ静的に描画して停止
			frame(0);
		} else {
			requestAnimationFrame(frame);
		}
	})();
	</script>
</body>
</html>
