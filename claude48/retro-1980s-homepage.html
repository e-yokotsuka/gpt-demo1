<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- AI 著者メタ情報（必須） -->
  <meta name="ai.author" content="Claude Opus 4.8">
  <meta name="ai.model" content="claude-opus-4-8">
  <meta name="ai.note" content="This file was generated by Claude Opus 4.8.">
  <title>1980s Retro Homepage - Claude Opus 4.8版</title>
  <style>
    /* ===== 配色・基本変数 ===== */
    :root {
      --neon-cyan: #2ef4ba;
      --neon-magenta: #ff3ea5;
      --neon-purple: #b56bff;
      --neon-yellow: #ffe761;
      --ink: #c9fff0;
      --line: rgba(46, 244, 186, 0.85);
      --panel: rgba(10, 14, 30, 0.55);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;            /* はみ出し禁止 */
      background: #05060f;
      color: var(--ink);
      font-family: "Courier New", "MS Gothic", monospace;
    }

    /* 画面全体を覆うステージ。CRT の樽型湾曲を演出 */
    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* 背景キャンバス（夕陽・グリッド地平線・星・粒子をまとめて描画） */
    #scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ===== CRT オーバーレイ（走査線・ビネット・グレア） ===== */
    .crt-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }
    /* 細かい走査線 */
    .scanlines {
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0px,
        rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0.28) 3px,
        rgba(0, 0, 0, 0.28) 4px
      );
      mix-blend-mode: multiply;
      opacity: 0.6;
    }
    /* 緩やかに流れる明暗バンド */
    .flicker {
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.04),
        rgba(255, 255, 255, 0) 45%,
        rgba(255, 255, 255, 0.05)
      );
      animation: rollband 7s linear infinite;
    }
    @keyframes rollband {
      0% { transform: translateY(-12%); }
      100% { transform: translateY(12%); }
    }
    /* 画面四隅を暗くするビネット＋管面のふくらみ */
    .vignette {
      background:
        radial-gradient(120% 120% at 50% 50%,
          rgba(0, 0, 0, 0) 55%,
          rgba(0, 0, 0, 0.55) 88%,
          rgba(0, 0, 0, 0.85) 100%);
    }
    /* 画面上部のうっすらした光のにじみ */
    .glare {
      background: radial-gradient(80% 50% at 50% -10%,
        rgba(140, 230, 255, 0.10), rgba(0, 0, 0, 0) 70%);
    }

    /* ===== コンテンツ層 ===== */
    .content {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: clamp(12px, 3vh, 28px) 16px;
      text-shadow: 0 0 8px rgba(46, 244, 186, 0.45);
      /* CRT の樽型湾曲（対応ブラウザのみ。非対応でも無害） */
      filter: saturate(1.05);
    }

    /* タイトルロゴ */
    header {
      text-align: center;
      margin-bottom: clamp(8px, 2vh, 18px);
      animation: floatIn 1s ease-out both;
    }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    h1 {
      margin: 0;
      font-size: clamp(26px, 7vw, 64px);
      font-weight: 900;
      letter-spacing: 0.06em;
      line-height: 1;
      /* クロマティックアベレーション（色ずれ）でレトロ感 */
      color: #fff;
      background: linear-gradient(180deg, var(--neon-yellow) 0%, var(--neon-magenta) 60%, var(--neon-purple) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter:
        drop-shadow(2px 0 0 rgba(255, 62, 165, 0.7))
        drop-shadow(-2px 0 0 rgba(46, 244, 186, 0.7))
        drop-shadow(0 0 18px rgba(181, 107, 255, 0.6));
    }
    .tagline {
      margin-top: 6px;
      font-size: clamp(11px, 2.4vw, 16px);
      letter-spacing: 0.32em;
      color: var(--neon-cyan);
      text-transform: uppercase;
    }

    /* ナビゲーション（光るメニューボタン） */
    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(6px, 1.4vw, 12px);
      margin-bottom: clamp(10px, 2.4vh, 20px);
      animation: floatIn 1s ease-out 0.15s both;
    }
    nav a {
      color: var(--neon-cyan);
      text-decoration: none;
      font-weight: bold;
      letter-spacing: 0.08em;
      padding: 7px 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(2px);
      box-shadow: 0 0 6px rgba(46, 244, 186, 0.25) inset;
      transition: color 0.18s, background 0.18s, box-shadow 0.18s, transform 0.18s;
    }
    nav a:hover, nav a:focus-visible {
      color: #04130f;
      background: var(--neon-cyan);
      box-shadow: 0 0 18px rgba(46, 244, 186, 0.8);
      transform: translateY(-2px);
      outline: none;
    }

    /* BBS ターミナル風パネル */
    .terminal {
      width: min(760px, 92vw);
      max-height: min(58vh, 520px);
      overflow: hidden;
      border: 2px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(3px);
      box-shadow:
        0 0 22px rgba(46, 244, 186, 0.25),
        0 0 60px rgba(181, 107, 255, 0.15) inset;
      padding: 14px 18px;
      animation: floatIn 1s ease-out 0.3s both;
    }
    .term-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(46, 244, 186, 0.4);
      padding-bottom: 8px;
      margin-bottom: 10px;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--neon-yellow);
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 6px currentColor; }
    .dot.r { color: var(--neon-magenta); background: var(--neon-magenta); }
    .dot.y { color: var(--neon-yellow); background: var(--neon-yellow); }
    .dot.g { color: var(--neon-cyan); background: var(--neon-cyan); }
    .term-title { margin-left: auto; opacity: 0.85; }

    #log {
      font-size: clamp(12px, 1.7vw, 15px);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 1.7em;
    }
    #log .prompt { color: var(--neon-magenta); }
    #log .hi { color: var(--neon-yellow); }
    #log .cy { color: var(--neon-cyan); }

    /* 点滅カーソル */
    .cursor {
      display: inline-block;
      width: 0.6em;
      height: 1.05em;
      background: var(--neon-cyan);
      box-shadow: 0 0 8px var(--neon-cyan);
      vertical-align: -0.18em;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

    /* 訪問者カウンタ */
    .counter {
      margin-top: clamp(10px, 2vh, 18px);
      font-size: clamp(11px, 2vw, 15px);
      letter-spacing: 0.18em;
      color: var(--neon-magenta);
      text-shadow: 0 0 10px rgba(255, 62, 165, 0.6);
      animation: floatIn 1s ease-out 0.45s both;
    }
    .counter .num {
      display: inline-block;
      padding: 2px 8px;
      margin: 0 2px;
      border: 1px solid var(--neon-magenta);
      background: rgba(0, 0, 0, 0.5);
      color: var(--neon-yellow);
      font-variant-numeric: tabular-nums;
    }

    footer {
      position: absolute;
      bottom: 8px;
      left: 0; right: 0;
      text-align: center;
      z-index: 4;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: rgba(201, 255, 240, 0.55);
    }

    /* 起動時の電源 ON フラッシュ */
    #powerOn {
      position: absolute;
      inset: 0;
      z-index: 50;
      background: #000;
      pointer-events: none;
      animation: powerOn 1.1s ease-out forwards;
    }
    @keyframes powerOn {
      0%   { opacity: 1; clip-path: inset(50% 0 50% 0); }
      18%  { opacity: 1; clip-path: inset(49.6% 0 49.6% 0); background: #fff; }
      24%  { opacity: 0.9; clip-path: inset(0 0 0 0); background: #fff; }
      40%  { opacity: 0.35; }
      100% { opacity: 0; }
    }

    /* ===== アニメーション抑制（アクセシビリティ） ===== */
    @media (prefers-reduced-motion: reduce) {
      .flicker, .cursor, header, nav, .terminal, .counter { animation: none !important; }
      #powerOn { display: none; }
      header, nav, .terminal, .counter { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <!-- 背景はすべて単一キャンバスに描画（高パフォーマンス） -->
    <canvas id="scene"></canvas>

    <!-- コンテンツ -->
    <div class="content">
      <header>
        <h1>RETRO&nbsp;NET&nbsp;'85</h1>
        <div class="tagline">Step into the Digital Frontier</div>
      </header>

      <nav>
        <a href="#">[ HOME ]</a>
        <a href="#">[ BBS ]</a>
        <a href="#">[ FILES ]</a>
        <a href="#">[ GALLERY ]</a>
        <a href="#">[ LINKS ]</a>
      </nav>

      <section class="terminal" aria-label="BBSターミナル">
        <div class="term-bar">
          <span class="dot r"></span>
          <span class="dot y"></span>
          <span class="dot g"></span>
          <span class="term-title">CRT-80 TERMINAL // 2400 BAUD</span>
        </div>
        <div id="log" role="log" aria-live="polite"></div>
      </section>

      <div class="counter">
        VISITORS SINCE 1985 &nbsp;
        <span id="counter"></span>
      </div>
    </div>

    <!-- CRT オーバーレイ層 -->
    <div class="crt-overlay glare"></div>
    <div class="crt-overlay flicker"></div>
    <div class="crt-overlay scanlines"></div>
    <div class="crt-overlay vignette"></div>

    <footer>(C) 1985-2026 RETRO NET &nbsp;//&nbsp; BEST VIEWED ON A CRT MONITOR &nbsp;//&nbsp; Claude Opus 4.8</footer>

    <!-- 電源 ON エフェクト -->
    <div id="powerOn"></div>
  </div>

  <script>
  "use strict";

  // モーション抑制設定の判定
  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ============================================================
     背景キャンバス：シンセウェーブ夕景
     ・グラデーション空 ＋ 星
     ・ネオンの太陽（スキャンライン入り）
     ・遠近グリッド地平線（スクロール）
     ・浮遊する光の粒子
     すべて 1 つの rAF ループでまとめて描画し負荷を抑える
     ============================================================ */
  const canvas = document.getElementById("scene");
  const ctx = canvas.getContext("2d", { alpha: false });

  let W = 0, H = 0, DPR = 1, horizon = 0;
  let stars = [];
  let particles = [];

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2); // 高 DPI でも 2 倍までに制限し負荷を抑制
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    horizon = H * 0.62; // 地平線の位置

    // 星を画面サイズに応じて再配置（地平線より上のみ）
    const starCount = Math.round((W * horizon) / 9000);
    stars = [];
    for (let i = 0; i < starCount; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * horizon,
        r: Math.random() * 1.3 + 0.2,
        tw: Math.random() * Math.PI * 2, // 瞬きの位相
        sp: Math.random() * 1.5 + 0.5
      });
    }

    // 浮遊粒子
    const pCount = Math.round(W / 28);
    particles = [];
    for (let i = 0; i < pCount; i++) {
      particles.push(newParticle(true));
    }
  }

  function newParticle(initial) {
    return {
      x: Math.random() * W,
      y: initial ? Math.random() * H : H + 10,
      vy: -(Math.random() * 0.4 + 0.15),
      r: Math.random() * 1.6 + 0.6,
      hue: Math.random() < 0.5 ? "rgba(46,244,186," : "rgba(255,62,165,",
      a: Math.random() * 0.5 + 0.2
    };
  }

  // 空のグラデーション（リサイズ時に作り直す）
  function skyGradient() {
    const g = ctx.createLinearGradient(0, 0, 0, horizon);
    g.addColorStop(0.0, "#0a0420");
    g.addColorStop(0.45, "#2a0a4e");
    g.addColorStop(0.78, "#7a1a6e");
    g.addColorStop(1.0, "#ff5b6e");
    return g;
  }
  // 地面のグラデーション
  function groundGradient() {
    const g = ctx.createLinearGradient(0, horizon, 0, H);
    g.addColorStop(0, "#1a0830");
    g.addColorStop(1, "#05030f");
    return g;
  }

  let t = 0;          // 時間（秒換算用）
  let gridOffset = 0; // グリッドのスクロール量
  let last = performance.now();

  function draw(now) {
    const dt = Math.min((now - last) / 1000, 0.05); // 大きすぎる dt を抑制
    last = now;
    if (!reduceMotion) {
      t += dt;
      gridOffset = (gridOffset + dt * 0.55) % 1;
    }

    // --- 空 ---
    ctx.fillStyle = skyGradient();
    ctx.fillRect(0, 0, W, horizon);

    // --- 星（瞬き） ---
    ctx.save();
    for (const s of stars) {
      const tw = reduceMotion ? 0.8 : (0.5 + 0.5 * Math.sin(t * s.sp + s.tw));
      ctx.globalAlpha = 0.25 + tw * 0.75;
      ctx.fillStyle = "#dff7ff";
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // --- ネオンの太陽 ---
    drawSun();

    // --- 地面 ---
    ctx.fillStyle = groundGradient();
    ctx.fillRect(0, horizon, W, H - horizon);

    // --- 遠近グリッド ---
    drawGrid();

    // --- 浮遊粒子 ---
    ctx.save();
    for (const p of particles) {
      if (!reduceMotion) {
        p.y += p.vy * 60 * dt;
        p.x += Math.sin((p.y + p.x) * 0.01) * 0.3;
      }
      if (p.y < -10) Object.assign(p, newParticle(false));
      ctx.fillStyle = p.hue + p.a + ")";
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    requestAnimationFrame(draw);
  }

  // ネオン太陽の描画（横スキャンラインでレトロ表現）
  function drawSun() {
    const cx = W / 2;
    const sunR = Math.min(W, H) * 0.18;
    const cy = horizon - sunR * 0.15;

    ctx.save();
    // グロー
    const glow = ctx.createRadialGradient(cx, cy, sunR * 0.2, cx, cy, sunR * 1.9);
    glow.addColorStop(0, "rgba(255, 220, 120, 0.55)");
    glow.addColorStop(1, "rgba(255, 90, 110, 0)");
    ctx.fillStyle = glow;
    ctx.fillRect(cx - sunR * 2, cy - sunR * 2, sunR * 4, sunR * 4);

    // 太陽本体は地平線より上だけ表示するためクリップ
    ctx.beginPath();
    ctx.rect(0, 0, W, horizon);
    ctx.clip();

    const body = ctx.createLinearGradient(cx, cy - sunR, cx, cy + sunR);
    body.addColorStop(0, "#ffe761");
    body.addColorStop(0.5, "#ff944d");
    body.addColorStop(1, "#ff3ea5");
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.arc(cx, cy, sunR, 0, Math.PI * 2);
    ctx.fill();

    // 太陽下半分にスキャンスリットを抜く
    ctx.globalCompositeOperation = "destination-out";
    const slitTop = cy + sunR * 0.05;
    let gap = 4;
    for (let y = slitTop, i = 0; y < cy + sunR; y += gap, i++) {
      const h = 2 + i * 0.7; // 下に行くほどスリットを太く
      ctx.fillRect(cx - sunR, y, sunR * 2, Math.min(h, gap - 1));
      gap = 4 + i * 0.6;
      y += h;
    }
    ctx.restore();
  }

  // 遠近グリッドの描画
  function drawGrid() {
    const cx = W / 2;
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, horizon, W, H - horizon);
    ctx.clip();

    ctx.lineWidth = 1;
    ctx.strokeStyle = "rgba(46, 244, 186, 0.55)";
    ctx.shadowColor = "rgba(46, 244, 186, 0.6)";
    ctx.shadowBlur = 6;

    // --- 縦線（消失点 cx へ収束） ---
    const cols = 18;
    const spread = W * 1.4;
    for (let i = -cols; i <= cols; i++) {
      const fx = cx + (i / cols) * (spread / 2); // 地面端の x
      ctx.beginPath();
      ctx.moveTo(cx, horizon);
      ctx.lineTo(fx, H);
      ctx.stroke();
    }

    // --- 横線（手前ほど間隔が広い遠近表現＋スクロール） ---
    const rows = 16;
    for (let i = 0; i <= rows; i++) {
      // 0..1 を非線形に変換して遠近感を出す。gridOffset でスクロール
      let f = (i + gridOffset) / rows;
      f = f % 1;
      const yy = horizon + (H - horizon) * (f * f); // 二乗で手前を広く
      ctx.globalAlpha = 0.25 + f * 0.75;
      ctx.beginPath();
      ctx.moveTo(0, yy);
      ctx.lineTo(W, yy);
      ctx.stroke();
    }
    ctx.restore();
  }

  /* ============================================================
     BBS ターミナル：タイプライター風ログ出力
     ============================================================ */
  const logEl = document.getElementById("log");
  const lines = [
    { t: "> ", c: "prompt", n: "" },
    { t: "CONNECTING TO RETRO NET BBS ...", c: "cy", n: "\n" },
    { t: "MODEM HANDSHAKE ... ", c: "", n: "" },
    { t: "OK", c: "hi", n: "\n" },
    { t: "LOGIN: ", c: "prompt", n: "" },
    { t: "GUEST", c: "hi", n: "\n" },
    { t: "\nようこそ、80年代のデジタルフロンティアへ。", c: "", n: "\n" },
    { t: "ブラウン管の残光、走査線、ネオンの地平線——", c: "", n: "\n" },
    { t: "あの頃の空気感を Claude Opus 4.8 が再構築しました。", c: "cy", n: "\n" },
    { t: "\nSYSTEM: 64KB RAM // 16 COLORS // STATUS ", c: "", n: "" },
    { t: "ONLINE", c: "hi", n: "\n" },
    { t: "> READY_", c: "prompt", n: "" }
  ];

  function buildStaticLog() {
    // モーション抑制時は一括表示
    let html = "";
    for (const l of lines) {
      const cls = l.c ? ` class="${l.c}"` : "";
      html += `<span${cls}>${escapeHtml(l.t)}</span>${escapeHtml(l.n)}`;
    }
    html += '<span class="cursor"></span>';
    logEl.innerHTML = html;
  }

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function typeLog() {
    let li = 0, ci = 0;
    let html = "";
    const cursor = '<span class="cursor"></span>';

    function step() {
      if (li >= lines.length) {
        logEl.innerHTML = html + cursor;
        return;
      }
      const line = lines[li];
      const cls = line.c ? ` class="${line.c}"` : "";

      if (ci === 0) html += `<span${cls}>`;

      if (ci < line.t.length) {
        html += escapeHtml(line.t[ci]);
        ci++;
        logEl.innerHTML = html + "</span>" + cursor;
        // 改行直後はやや長めに待つ
        setTimeout(step, line.t[ci - 1] === " " ? 14 : 22);
      } else {
        html += "</span>" + escapeHtml(line.n);
        li++; ci = 0;
        logEl.innerHTML = html + cursor;
        setTimeout(step, line.n.includes("\n") ? 160 : 30);
      }
    }
    step();
  }

  /* ============================================================
     訪問者カウンタ：桁が回るアニメーション
     ============================================================ */
  const counterEl = document.getElementById("counter");
  const TARGET = 138472; // 表示する到達値
  function renderCounter(val) {
    const str = String(val).padStart(6, "0");
    counterEl.innerHTML = str.split("").map(d => `<span class="num">${d}</span>`).join("");
  }
  function animateCounter() {
    if (reduceMotion) { renderCounter(TARGET); return; }
    const dur = 1800;
    const start = performance.now();
    function tick(now) {
      const p = Math.min((now - start) / dur, 1);
      // イーズアウト
      const e = 1 - Math.pow(1 - p, 3);
      renderCounter(Math.floor(TARGET * e));
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  /* ============================================================
     初期化
     ============================================================ */
  window.addEventListener("resize", resize, { passive: true });
  resize();
  requestAnimationFrame((now) => { last = now; draw(now); });

  if (reduceMotion) {
    buildStaticLog();
    renderCounter(TARGET);
  } else {
    // 電源 ON フラッシュ後にタイプ開始
    setTimeout(typeLog, 900);
    setTimeout(animateCounter, 900);
  }
  </script>
</body>
</html>
