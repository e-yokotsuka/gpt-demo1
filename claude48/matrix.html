<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="ai.author" content="Claude Opus 4.8">
<meta name="ai.model" content="claude-opus-4-8">
<meta name="ai.note" content="Generated by Claude Opus 4.8.">
<title>Digital Rain Matrix - Claude Opus 4.8版</title>
<style>
	html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
	canvas { display: block; }
	/* モデル名バッジ */
	.tag {
		position: fixed;
		left: 14px;
		bottom: 12px;
		z-index: 2;
		font-family: "Courier New", monospace;
		font-size: 11px;
		letter-spacing: 0.18em;
		color: rgba(120, 255, 170, 0.55);
		text-transform: uppercase;
		pointer-events: none;
		user-select: none;
		text-shadow: 0 0 8px rgba(0, 255, 120, 0.5);
	}
</style>
</head>
<body>
	<canvas id="c"></canvas>
	<div class="tag">Claude Opus 4.8 · Digital Rain</div>
	<script>
	(() => {
		// Claude Opus 4.8 によるデジタルレイン実装。
		// 列ごとに速度・トレイル長・チラつき率を持たせ、先頭は白く発光、
		// 後続はグリーンのグラデーションで減衰。稀に金色（Claudeカラー）の列が流れる。
		const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
		const canvas = document.getElementById("c");
		const ctx = canvas.getContext("2d", { alpha: false });

		// グリフ集合：カタカナ + ラテン大文字 + 数字 + 記号
		const katakana = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンヰヱ";
		const latin = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
		const digits = "0123456789";
		const symbols = "✦◇=*+<>|¦";
		const GLYPHS = (katakana + latin + digits + symbols).split("");
		const rnd = (a, b) => a + Math.random() * (b - a);
		const pick = () => GLYPHS[(Math.random() * GLYPHS.length) | 0];

		let W, H, DPR, fontSize, cols, rows, columns;

		function makeColumn(x) {
			return {
				x,
				head: rnd(-rows, 0), // 先頭の行位置
				speed: rnd(0.2, 0.85), // 1フレームあたりの落下行数
				len: (rnd(0.3, 0.75) * rows) | 0, // トレイル長（行数）
				glyphs: Array.from({ length: rows + 2 }, pick),
				flicker: rnd(0.01, 0.06), // 文字が入れ替わる確率
				gold: Math.random() < 0.05, // 稀に金色（Claudeカラー）の列
			};
		}

		function setup() {
			DPR = Math.min(2, window.devicePixelRatio || 1);
			W = window.innerWidth;
			H = window.innerHeight;
			canvas.width = W * DPR;
			canvas.height = H * DPR;
			canvas.style.width = W + "px";
			canvas.style.height = H + "px";
			ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
			fontSize = Math.max(14, Math.min(20, Math.round(W / 64)));
			cols = Math.ceil(W / fontSize);
			rows = Math.ceil(H / fontSize) + 2;
			ctx.font = `${fontSize}px "MS Gothic", "Courier New", monospace`;
			ctx.textBaseline = "top";
			columns = Array.from({ length: cols }, (_, i) => makeColumn(i * fontSize));
		}

		function draw() {
			// 残像を残す半透明フェード
			ctx.fillStyle = "rgba(0,0,0,0.08)";
			ctx.fillRect(0, 0, W, H);

			for (const col of columns) {
				const headRow = col.head | 0;

				for (let t = 0; t < col.len; t++) {
					const row = headRow - t;
					if (row < 0 || row > rows) continue;
					const y = row * fontSize;

					// たまに文字を差し替えてチラつかせる
					if (Math.random() < col.flicker) col.glyphs[row] = pick();
					const ch = col.glyphs[row];

					if (t === 0) {
						// 先頭：白く強く光る
						ctx.shadowColor = col.gold ? "rgba(255,210,120,0.9)" : "rgba(180,255,210,0.9)";
						ctx.shadowBlur = 16;
						ctx.fillStyle = "#ffffff";
					} else {
						const f = 1 - t / col.len; // 1（先頭寄り）→ 0（末尾）の減衰
						ctx.shadowBlur = t < 3 ? 10 : 0;
						if (col.gold) {
							ctx.shadowColor = "rgba(255,190,90,0.7)";
							ctx.fillStyle = `rgba(255,${(160 + 70 * f) | 0},${(60 * f) | 0},${(0.15 + 0.85 * f).toFixed(3)})`;
						} else {
							ctx.shadowColor = "rgba(0,255,120,0.6)";
							const g = (140 + 115 * f) | 0;
							ctx.fillStyle = `rgba(${(40 * f) | 0},${g},${(90 * f) | 0},${(0.12 + 0.88 * f).toFixed(3)})`;
						}
					}
					ctx.fillText(ch, col.x, y);
				}

				col.head += col.speed * (reduce ? 0.4 : 1);

				// 先頭が下端を抜けたらランダムに再生成
				if (col.head - col.len > rows && Math.random() > 0.96) {
					Object.assign(col, makeColumn(col.x));
					col.head = rnd(-rows * 0.5, 0);
				}
			}
			ctx.shadowBlur = 0;
			requestAnimationFrame(draw);
		}

		setup();
		addEventListener("resize", setup);
		requestAnimationFrame(draw);
	})();
	</script>
</body>
</html>
