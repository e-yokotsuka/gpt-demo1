<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="ai.author" content="Claude Opus 4.8">
	<meta name="ai.model" content="claude-opus-4-8">
	<meta name="ai.note" content="Falling Snowflakes - Claude Opus 4.8 original edition.">
	<title>Falling Snowflakes - Claude Opus 4.8版</title>
	<style>
		/* 画面全体を覆い、はみ出しを隠す */
		html, body {
			margin: 0;
			padding: 0;
			width: 100vw;
			height: 100vh;
			overflow: hidden;
			background: #060a16;
		}
		#stage {
			display: block;
			width: 100vw;
			height: 100vh;
		}
		/* 右下の控えめなクレジットバッジ */
		.badge {
			position: fixed;
			bottom: 14px;
			right: 16px;
			padding: 7px 14px;
			border-radius: 999px;
			font: 600 11px/1 system-ui, "Segoe UI", sans-serif;
			letter-spacing: 0.14em;
			color: rgba(226, 240, 255, 0.85);
			background: rgba(14, 24, 44, 0.45);
			border: 1px solid rgba(150, 200, 255, 0.25);
			backdrop-filter: blur(6px);
			-webkit-backdrop-filter: blur(6px);
			pointer-events: none;
			user-select: none;
		}
	</style>
</head>
<body>
	<canvas id="stage"></canvas>
	<div class="badge">CLAUDE OPUS 4.8 · SNOW</div>
	<script>
	// =========================================================================
	// Falling Snowflakes — Claude Opus 4.8 オリジナル版
	//
	// 設計方針:
	//   1. スプライトキャッシュ … 雪片の見た目をオフスクリーンに事前描画し、
	//      毎フレームは drawImage だけにすることで arc/stroke のコストを排除。
	//   2. 奥行きパララックス … depth(0..1) で大きさ・速度・明るさ・ぼけを連動。
	//   3. デルタタイム駆動 … フレームレートに依存しない一定の落下速度。
	//   4. 風 + マウス … 緩やかに揺らぐ風と、カーソル付近の局所的な気流。
	//   5. 雰囲気演出 … オーロラ調グラデ背景・流れる霧・地面の積雪グロー。
	//   6. prefers-reduced-motion を尊重し、静的な美しい一枚絵に切り替え。
	// =========================================================================

	const canvas = document.getElementById('stage');
	const ctx = canvas.getContext('2d', { alpha: false });

	// モーション抑制設定の検出
	const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

	let viewW = 0;          // CSSピクセル幅
	let viewH = 0;          // CSSピクセル高さ
	let dpr = 1;            // デバイスピクセル比（上限を設けて高解像度端末でも軽量に）

	// ---------------------------------------------------------------------
	// スプライトキャッシュ
	//   雪片は「やわらかい発光ドット」と「6回対称の結晶」の2系統。
	//   それぞれを離散化したサイズ段階で事前レンダリングして使い回す。
	// ---------------------------------------------------------------------
	const SPRITE_STEPS = 7;        // サイズ段階数
	const dotSprites = [];         // 発光ドット
	const crystalSprites = [];     // 結晶

	// やわらかな発光ドットを生成
	function makeDotSprite(radius) {
		const pad = 2;
		const size = Math.ceil((radius + pad) * 2);
		const off = document.createElement('canvas');
		off.width = size;
		off.height = size;
		const c = off.getContext('2d');
		const cx = size / 2;
		const g = c.createRadialGradient(cx, cx, 0, cx, cx, radius + pad);
		g.addColorStop(0.0, 'rgba(255, 255, 255, 1)');
		g.addColorStop(0.35, 'rgba(236, 246, 255, 0.95)');
		g.addColorStop(0.75, 'rgba(180, 214, 255, 0.35)');
		g.addColorStop(1.0, 'rgba(150, 200, 255, 0)');
		c.fillStyle = g;
		c.beginPath();
		c.arc(cx, cx, radius + pad, 0, Math.PI * 2);
		c.fill();
		return off;
	}

	// 6回対称の雪結晶を生成（中心グロー + 主枝 + 側枝）
	function makeCrystalSprite(radius) {
		const pad = 3;
		const size = Math.ceil((radius + pad) * 2);
		const off = document.createElement('canvas');
		off.width = size;
		off.height = size;
		const c = off.getContext('2d');
		const cx = size / 2;
		c.translate(cx, cx);

		// 中心のほのかな光
		const glow = c.createRadialGradient(0, 0, 0, 0, 0, radius);
		glow.addColorStop(0, 'rgba(255, 255, 255, 0.55)');
		glow.addColorStop(1, 'rgba(255, 255, 255, 0)');
		c.fillStyle = glow;
		c.beginPath();
		c.arc(0, 0, radius, 0, Math.PI * 2);
		c.fill();

		// 枝の描画
		c.strokeStyle = 'rgba(245, 251, 255, 0.92)';
		c.lineWidth = Math.max(0.6, radius * 0.07);
		c.lineCap = 'round';
		const arm = radius * 0.92;
		for (let i = 0; i < 6; i++) {
			const a = (Math.PI / 3) * i;
			const ex = Math.cos(a) * arm;
			const ey = Math.sin(a) * arm;
			// 主枝
			c.beginPath();
			c.moveTo(0, 0);
			c.lineTo(ex, ey);
			c.stroke();
			// 側枝（左右対称に2対）
			for (const t of [0.45, 0.7]) {
				const bx = ex * t;
				const by = ey * t;
				const blen = arm * 0.26 * (1 - t * 0.4);
				for (const sgn of [1, -1]) {
					const ba = a + sgn * (Math.PI / 4);
					c.beginPath();
					c.moveTo(bx, by);
					c.lineTo(bx + Math.cos(ba) * blen, by + Math.sin(ba) * blen);
					c.stroke();
				}
			}
		}
		return off;
	}

	// サイズ段階ごとにスプライトを構築
	function buildSprites() {
		dotSprites.length = 0;
		crystalSprites.length = 0;
		for (let i = 0; i < SPRITE_STEPS; i++) {
			const t = i / (SPRITE_STEPS - 1);
			const dotR = (1.0 + t * 4.5) * dpr;        // 1.0〜5.5
			const cryR = (5.0 + t * 9.0) * dpr;        // 5.0〜14.0
			dotSprites.push(makeDotSprite(dotR));
			crystalSprites.push(makeCrystalSprite(cryR));
		}
	}

	// ---------------------------------------------------------------------
	// 雪片
	// ---------------------------------------------------------------------
	const flakes = [];

	function makeFlake(initial) {
		const depth = Math.random();                       // 0=遠い, 1=近い
		// 約15%を結晶、残りを発光ドットに
		const isCrystal = Math.random() < 0.15;
		// 段階インデックス（近いほど大きいスプライト）
		const step = Math.min(SPRITE_STEPS - 1, Math.floor(depth * SPRITE_STEPS));
		return {
			x: Math.random() * viewW,
			y: initial ? Math.random() * viewH : -20,
			depth,
			isCrystal,
			step,
			// 近いほど速く・大きく・明るく
			speed: (12 + depth * 58),                       // px/秒（CSSピクセル）
			drift: 0.4 + depth * 1.1,                        // 横揺れ量
			phase: Math.random() * Math.PI * 2,
			phaseSpeed: 0.6 + Math.random() * 1.2,           // 揺れの速さ
			rot: Math.random() * Math.PI * 2,
			rotSpeed: (Math.random() - 0.5) * (isCrystal ? 1.2 : 0.3),
			alpha: 0.35 + depth * 0.6,
			scale: 0.8 + depth * 0.6,
			twinkle: Math.random() * Math.PI * 2,
			twinkleSpeed: 1 + Math.random() * 2,
		};
	}

	function populate() {
		flakes.length = 0;
		// 画面面積に応じた密度（上限つき）
		const count = Math.min(520, Math.floor(viewW * viewH / 5200));
		for (let i = 0; i < count; i++) flakes.push(makeFlake(true));
		// 奥→手前の順に描画されるよう一度だけソート
		flakes.sort((a, b) => a.depth - b.depth);
	}

	// ---------------------------------------------------------------------
	// 風 + マウス気流
	// ---------------------------------------------------------------------
	let wind = 0;
	let windTarget = 0;
	let gustTimer = 0;
	const mouse = { x: -9999, y: -9999, active: false };

	window.addEventListener('pointermove', (e) => {
		mouse.x = e.clientX;
		mouse.y = e.clientY;
		mouse.active = true;
	});
	window.addEventListener('pointerleave', () => { mouse.active = false; });

	// ---------------------------------------------------------------------
	// 背景（オーロラ調グラデ + 流れる霧）
	// ---------------------------------------------------------------------
	let fogOffset = 0;

	function drawBackground(dt) {
		// 縦グラデの夜空
		const sky = ctx.createLinearGradient(0, 0, 0, viewH);
		sky.addColorStop(0.0, '#050813');
		sky.addColorStop(0.45, '#0c1730');
		sky.addColorStop(0.8, '#152544');
		sky.addColorStop(1.0, '#1d2f52');
		ctx.fillStyle = sky;
		ctx.fillRect(0, 0, viewW, viewH);

		// 上空のオーロラのほのかな帯
		fogOffset += dt * 8;
		const aur = ctx.createRadialGradient(
			viewW * (0.3 + 0.15 * Math.sin(fogOffset * 0.02)), -viewH * 0.2, 0,
			viewW * 0.5, viewH * 0.1, viewW * 0.8
		);
		aur.addColorStop(0, 'rgba(86, 170, 200, 0.16)');
		aur.addColorStop(0.5, 'rgba(120, 140, 210, 0.07)');
		aur.addColorStop(1, 'rgba(0, 0, 0, 0)');
		ctx.fillStyle = aur;
		ctx.fillRect(0, 0, viewW, viewH);

		// 地面付近の積雪グロー
		const ground = ctx.createLinearGradient(0, viewH * 0.78, 0, viewH);
		ground.addColorStop(0, 'rgba(200, 224, 255, 0)');
		ground.addColorStop(1, 'rgba(214, 232, 255, 0.22)');
		ctx.fillStyle = ground;
		ctx.fillRect(0, viewH * 0.78, viewW, viewH * 0.22);
	}

	// ---------------------------------------------------------------------
	// メインループ（デルタタイム駆動）
	// ---------------------------------------------------------------------
	let last = performance.now();

	function frame(now) {
		let dt = (now - last) / 1000;
		last = now;
		// タブ復帰時などの巨大な dt を抑制
		if (dt > 0.05) dt = 0.05;

		// 風を緩やかに更新（突風を時々発生）
		gustTimer -= dt;
		if (gustTimer <= 0) {
			windTarget = (Math.random() - 0.5) * 70;        // px/秒
			gustTimer = 2 + Math.random() * 4;
		}
		wind += (windTarget - wind) * Math.min(1, dt * 0.6);

		drawBackground(dt);

		ctx.globalCompositeOperation = 'lighter';            // 雪の重なりを発光的に

		for (const f of flakes) {
			// 揺れ・回転・落下
			f.phase += f.phaseSpeed * dt;
			f.rot += f.rotSpeed * dt;
			f.twinkle += f.twinkleSpeed * dt;

			let vx = Math.sin(f.phase) * f.drift * 18 + wind * (0.3 + f.depth * 0.7);

			// マウス近傍の気流（手前の雪ほど強く反応）
			if (mouse.active) {
				const ddx = f.x - mouse.x;
				const ddy = f.y - mouse.y;
				const d2 = ddx * ddx + ddy * ddy;
				const R = 140;
				if (d2 < R * R) {
					const d = Math.sqrt(d2) || 1;
					const force = (1 - d / R) * 90 * (0.4 + f.depth);
					vx += (ddx / d) * force;
					f.y += (ddy / d) * force * 0.4 * dt;
				}
			}

			f.x += vx * dt;
			f.y += f.speed * dt;

			// 画面外の巻き戻し
			if (f.y > viewH + 24) {
				f.y = -20;
				f.x = Math.random() * viewW;
			}
			if (f.x < -30) f.x = viewW + 30;
			else if (f.x > viewW + 30) f.x = -30;

			// きらめき（手前の雪のみ明滅を強める）
			const tw = 1 + Math.sin(f.twinkle) * 0.18 * f.depth;
			ctx.globalAlpha = Math.min(1, f.alpha * tw);

			const sprite = f.isCrystal ? crystalSprites[f.step] : dotSprites[f.step];
			const sw = sprite.width * f.scale;
			const sh = sprite.height * f.scale;

			if (f.isCrystal) {
				// 結晶は回転させて描画
				ctx.translate(f.x * dpr, f.y * dpr);
				ctx.rotate(f.rot);
				ctx.drawImage(sprite, -sw / 2, -sh / 2, sw, sh);
				ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
			} else {
				ctx.drawImage(sprite, f.x * dpr - sw / 2, f.y * dpr - sh / 2, sw, sh);
			}
		}

		ctx.globalAlpha = 1;
		ctx.globalCompositeOperation = 'source-over';

		requestAnimationFrame(frame);
	}

	// ---------------------------------------------------------------------
	// モーション抑制時の静止画
	// ---------------------------------------------------------------------
	function drawStatic() {
		drawBackground(0);
		ctx.globalCompositeOperation = 'lighter';
		for (const f of flakes) {
			ctx.globalAlpha = f.alpha;
			const sprite = f.isCrystal ? crystalSprites[f.step] : dotSprites[f.step];
			const sw = sprite.width * f.scale;
			const sh = sprite.height * f.scale;
			ctx.drawImage(sprite, f.x * dpr - sw / 2, f.y * dpr - sh / 2, sw, sh);
		}
		ctx.globalAlpha = 1;
		ctx.globalCompositeOperation = 'source-over';
	}

	// ---------------------------------------------------------------------
	// リサイズ処理（DPR追従・スプライト再構築・密度再計算）
	// ---------------------------------------------------------------------
	let resizeRAF = 0;
	function resize() {
		dpr = Math.min(window.devicePixelRatio || 1, 2);   // 上限2で高DPI端末でも軽量に
		// 非表示 iframe 内では innerWidth/Height が 0 になり真っ暗になるためフォールバック
		viewW = window.innerWidth || 960;
		viewH = window.innerHeight || 600;
		canvas.width = Math.floor(viewW * dpr);
		canvas.height = Math.floor(viewH * dpr);
		canvas.style.width = viewW + 'px';
		canvas.style.height = viewH + 'px';
		ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
		buildSprites();
		populate();
		if (reduceMotion) drawStatic();
	}

	window.addEventListener('resize', () => {
		// リサイズ連打を間引く
		if (resizeRAF) cancelAnimationFrame(resizeRAF);
		resizeRAF = requestAnimationFrame(resize);
	});

	// ---------------------------------------------------------------------
	// 起動
	// ---------------------------------------------------------------------
	resize();
	if (!reduceMotion) {
		last = performance.now();
		requestAnimationFrame(frame);
	}
	</script>
</body>
</html>
