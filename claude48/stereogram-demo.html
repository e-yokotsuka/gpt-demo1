<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- AIメタ情報（このファイルの作者・モデル） -->
  <meta name="ai.author" content="Claude Opus 4.8">
  <meta name="ai.model" content="claude-opus-4-8">
  <meta name="ai.note" content="Single-file animated autostereogram (SIRDS). Generated by Claude Opus 4.8.">
  <title>Stereogram Demo - Claude Opus 4.8版</title>
  <style>
    /* ===== 全体テーマ（深い宇宙色 + ネオン） ===== */
    :root {
      --bg: #05070f;
      --panel: rgba(13, 19, 34, 0.72);
      --panel-edge: rgba(125, 196, 255, 0.22);
      --text: #e6efff;
      --muted: #93a6cf;
      --accent: #6fe3ff;
      --accent2: #c08bff;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.55);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;            /* はみ出し禁止 */
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    /* ステレオグラム本体（画面いっぱい） */
    #view {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      image-rendering: auto;       /* 補間ありで滑らかに拡大 */
      cursor: crosshair;
    }

    /* ===== コントロールパネル（グラスモーフィズム） ===== */
    .panel {
      position: fixed;
      left: 16px;
      top: 16px;
      width: min(330px, calc(100vw - 32px));
      padding: 16px 18px 14px;
      background: var(--panel);
      border: 1px solid var(--panel-edge);
      border-radius: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px) saturate(1.3);
      -webkit-backdrop-filter: blur(14px) saturate(1.3);
      transition: transform 0.45s cubic-bezier(.22,.9,.3,1), opacity 0.45s;
      z-index: 10;
      user-select: none;
    }
    .panel.collapsed {
      transform: translateX(calc(-100% - 24px));
      opacity: 0;
      pointer-events: none;
    }
    .panel h1 {
      margin: 0 0 4px;
      font-size: 15px;
      letter-spacing: 0.08em;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .panel .sub {
      margin: 0 0 12px;
      font-size: 10.5px;
      letter-spacing: 0.16em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .row {
      display: grid;
      grid-template-columns: 78px 1fr 42px;
      gap: 9px;
      align-items: center;
      margin: 9px 0;
      font-size: 12px;
      color: var(--muted);
    }
    .row label { white-space: nowrap; }
    .row output {
      text-align: right;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      font-size: 12px;
    }
    .row select {
      grid-column: 2 / span 2;
      background: rgba(20, 30, 54, 0.9);
      color: var(--text);
      border: 1px solid rgba(120, 160, 230, 0.35);
      border-radius: 9px;
      padding: 6px 8px;
      font-size: 12px;
      outline: none;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 5px;
      border-radius: 5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 15px; height: 15px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(111, 227, 255, 0.35), 0 2px 5px rgba(0,0,0,.5);
      cursor: pointer;
      transition: box-shadow .15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 5px rgba(111, 227, 255, 0.45), 0 2px 5px rgba(0,0,0,.5);
    }
    input[type="range"]::-moz-range-thumb {
      width: 15px; height: 15px; border: none; border-radius: 50%;
      background: #fff; cursor: pointer;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 13px;
    }
    button {
      flex: 1 1 auto;
      border: 1px solid rgba(120, 160, 230, 0.35);
      background: rgba(24, 36, 64, 0.85);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: background .15s, transform .08s, border-color .15s;
    }
    button:hover { background: rgba(36, 54, 96, 0.95); border-color: var(--accent); }
    button:active { transform: scale(0.96); }
    button.on { background: linear-gradient(90deg, rgba(111,227,255,.28), rgba(192,139,255,.28)); border-color: var(--accent); }
    .help {
      margin-top: 13px;
      font-size: 11px;
      line-height: 1.6;
      color: var(--muted);
    }
    .help b { color: var(--accent); font-weight: 600; }

    /* パネル開閉トグル（ハンバーガー） */
    #toggle {
      position: fixed;
      left: 16px; top: 16px;
      width: 42px; height: 42px;
      z-index: 11;
      border-radius: 12px;
      border: 1px solid var(--panel-edge);
      background: var(--panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--accent);
      font-size: 19px; line-height: 1;
      display: none;             /* パネルが開いている間は隠す */
      align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    #toggle.show { display: flex; }

    /* 立体視を助ける合焦ガイド（上部の2点） */
    .guides {
      position: fixed;
      top: 28px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 0;
      pointer-events: none;
      z-index: 5;
      opacity: 0.9;
      transition: opacity .35s;
    }
    .guides.hidden { opacity: 0; }
    .guide-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff, var(--accent) 70%);
      box-shadow: 0 0 10px rgba(111,227,255,.8);
    }

    /* FPS表示 */
    #fps {
      position: fixed;
      right: 14px; bottom: 12px;
      font-size: 11px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      z-index: 5;
      letter-spacing: .04em;
      pointer-events: none;
      text-shadow: 0 1px 3px #000;
    }

    @media (max-width: 520px) {
      .panel { left: 10px; top: 10px; padding: 13px 14px; }
      #toggle { left: 10px; top: 10px; }
      .row { grid-template-columns: 66px 1fr 38px; }
    }
  </style>
</head>
<body>
  <!-- ステレオグラム描画キャンバス（画面全体） -->
  <canvas id="view"></canvas>

  <!-- 合焦ガイドの2点（壁を見るように2点を3点に重ねると立体が出やすい） -->
  <div class="guides" id="guides">
    <div class="guide-dot"></div>
    <div class="guide-dot" id="guide2"></div>
  </div>

  <!-- パネル再表示用トグル -->
  <button id="toggle" title="パネルを開く" aria-label="open panel">☰</button>

  <!-- 操作パネル -->
  <section class="panel" id="panel">
    <h1>STEREOGRAM STUDIO</h1>
    <p class="sub">Claude Opus 4.8 · Autostereogram</p>

    <div class="row">
      <label for="mode">シーン</label>
      <select id="mode">
        <option value="orb">浮遊する球体</option>
        <option value="ripple">水紋リップル</option>
        <option value="terrain">うねる地形</option>
        <option value="text">立体文字 4.8</option>
        <option value="tunnel">トンネル</option>
      </select>
    </div>
    <div class="row">
      <label for="sep">パターン幅</label>
      <input id="sep" type="range" min="48" max="120" step="1" value="78">
      <output id="sep-v">78</output>
    </div>
    <div class="row">
      <label for="depth">奥行き</label>
      <input id="depth" type="range" min="6" max="48" step="1" value="26">
      <output id="depth-v">26</output>
    </div>
    <div class="row">
      <label for="speed">速度</label>
      <input id="speed" type="range" min="0" max="100" step="1" value="45">
      <output id="speed-v">45</output>
    </div>
    <div class="row">
      <label for="quality">解像度</label>
      <input id="quality" type="range" min="40" max="100" step="5" value="80">
      <output id="quality-v">80</output>
    </div>

    <div class="actions">
      <button id="btn-pause">一時停止</button>
      <button id="btn-noise">ノイズ更新</button>
    </div>
    <div class="actions">
      <button id="btn-guide" class="on">ガイド</button>
      <button id="btn-color" class="on">カラー</button>
      <button id="btn-hide">パネルを隠す</button>
    </div>

    <div class="help">
      画面の<b>奥（壁の向こう）</b>を見るように視線をぼかすと立体が浮かびます。
      上部の<b>2つの光点が3つに見える</b>位置で焦点が合っています。
    </div>
  </section>

  <div id="fps">-- fps</div>

  <script>
  "use strict";
  // =====================================================================
  // Claude Opus 4.8版 オートステレオグラム（SIRDS）
  //   ・深度マップをアニメーションで生成
  //   ・横方向の繰り返しパターンを深度に応じてシフトし立体視を作る
  //   ・内部解像度でレンダリングし、画面いっぱいに滑らかに拡大
  //   ・TypedArray の使い回しでGC負荷を抑え、可変解像度で60fpsを狙う
  // =====================================================================

  const canvas = document.getElementById("view");
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";

  // reduced-motion を尊重（自動アニメは止め、操作で動かせる状態にする）
  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // ---- 内部レンダリング用オフスクリーン -------------------------------
  const buf = document.createElement("canvas");
  const bctx = buf.getContext("2d", { willReadFrequently: false });

  // 内部解像度（リサイズ・品質スライダーで再構築）
  let W = 0, H = 0;
  let img = null, px = null;       // ImageData
  let depth = null;                // Float32Array 深度 (0..1)
  let pattern = null;              // Uint8Array カラーノイズパターン (W*H*3)
  let same = null;                 // Int32Array 同一視差リンク
  let rowRGB = null;              // Uint8ClampedArray 1行分のRGB

  // パレット（カラー時の色付け用）— 滑らかなネオングラデーション
  const palette = new Uint8Array(256 * 3);
  function buildPalette() {
    for (let i = 0; i < 256; i++) {
      const t = i / 255;
      // 深い藍 → シアン → マゼンタ → 白に近い色へ
      const r = 40 + 215 * Math.pow(t, 1.4);
      const g = 70 + 150 * Math.sin(t * Math.PI * 0.9);
      const b = 130 + 125 * (1 - Math.pow(1 - t, 1.6));
      palette[i * 3]     = Math.min(255, r) | 0;
      palette[i * 3 + 1] = Math.min(255, Math.max(0, g)) | 0;
      palette[i * 3 + 2] = Math.min(255, b) | 0;
    }
  }
  buildPalette();

  // ---- 状態 -----------------------------------------------------------
  const state = {
    mode: "orb",
    sep: 78,          // 基本パターン幅(px, 内部解像度基準)
    depthAmt: 26,     // 奥行きの最大シフト量(px)
    speed: 0.45,      // 0..1
    quality: 0.80,    // 内部解像度スケール
    paused: false,
    color: true,
    guide: true,
    time: 0,
    // シーン遷移（モード切替時に滑らかにブレンド）
    morph: 1,         // 0..1, 1で遷移完了
    prevMode: "orb",
  };

  // ---- 乱数（再現性のある軽量PRNG。ノイズ更新でシード変更） -----------
  let seed = (Math.random() * 0xffffffff) >>> 0;
  function rngReset(s) { seed = s >>> 0; }
  function rng() {
    // xorshift32
    seed ^= seed << 13; seed >>>= 0;
    seed ^= seed >> 17;
    seed ^= seed << 5;  seed >>>= 0;
    return seed / 4294967296;
  }

  // カラーノイズパターン生成（高彩度のランダムドット）
  function buildPattern() {
    rngReset(seed === 0 ? 1 : seed);
    for (let i = 0; i < W * H; i++) {
      // 明暗のはっきりしたドット（立体視しやすい）。色相も散らす。
      const lum = rng() < 0.5 ? 30 + rng() * 50 : 200 + rng() * 55;
      const hueShift = rng();
      const k = i * 3;
      if (state.color) {
        pattern[k]     = Math.min(255, lum * (0.7 + hueShift * 0.6)) | 0;
        pattern[k + 1] = Math.min(255, lum * (0.7 + (1 - hueShift) * 0.5)) | 0;
        pattern[k + 2] = Math.min(255, lum * (0.6 + rng() * 0.7)) | 0;
      } else {
        pattern[k] = pattern[k + 1] = pattern[k + 2] = lum | 0;
      }
    }
  }

  // ---- 内部バッファ確保（解像度変更時） --------------------------------
  function allocate() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    // 内部解像度：画面比率を保ちつつ品質スケールを掛ける（負荷とのバランス）
    const targetW = Math.round(vw * state.quality);
    W = Math.max(320, Math.min(1280, targetW));
    H = Math.max(180, Math.round(W * (vh / vw)));

    buf.width = W; buf.height = H;
    img = bctx.createImageData(W, H);
    px = img.data;
    // アルファを255で埋める（毎フレーム書かない）
    for (let i = 3; i < px.length; i += 4) px[i] = 255;

    depth = new Float32Array(W * H);
    pattern = new Uint8Array(W * H * 3);
    same = new Int32Array(W);
    rowRGB = new Uint8ClampedArray(W * 3);

    buildPattern();

    // 表示キャンバスはデバイスピクセルに合わせる
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(vw * dpr);
    canvas.height = Math.round(vh * dpr);
    canvas.style.width = vw + "px";
    canvas.style.height = vh + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";

    // 合焦ガイドの2点間隔 = 表示上のパターン幅に合わせる
    updateGuideGap();
  }

  // ガイド2点の間隔を、表示上のパターン幅に一致させる（収束しやすく）
  function updateGuideGap() {
    const scale = window.innerWidth / W;        // 内部→表示の拡大率
    const gap = state.sep * scale;
    const g2 = document.getElementById("guide2");
    g2.style.marginLeft = (gap - 12) + "px";    // dot幅12pxぶん補正
  }

  // =====================================================================
  // 深度マップ生成（各シーン）。値域 0..1（手前=大、奥=小）。
  // =====================================================================

  function sceneOrb(t, out, weight) {
    // ゆっくり公転する球体 + 小さな衛星
    const cx = W * (0.5 + Math.sin(t * 0.45) * 0.18);
    const cy = H * (0.5 + Math.cos(t * 0.33) * 0.12);
    const R = Math.min(W, H) * (0.26 + Math.sin(t * 0.6) * 0.03);
    const R2 = R * R;
    const sx = W * (0.5 + Math.sin(t * 1.3 + 1) * 0.30);
    const sy = H * (0.5 + Math.cos(t * 1.1) * 0.30);
    const sr = Math.min(W, H) * 0.10, sr2 = sr * sr;
    for (let y = 0; y < H; y++) {
      const dy = y - cy, dy2 = dy * dy;
      const dys = y - sy, dys2 = dys * dys;
      const o = y * W;
      for (let x = 0; x < W; x++) {
        let v = 0;
        const dx = x - cx;
        const d2 = dx * dx + dy2;
        if (d2 < R2) v = 0.45 + 0.55 * Math.sqrt(1 - d2 / R2);
        const dxs = x - sx;
        const ds2 = dxs * dxs + dys2;
        if (ds2 < sr2) {
          const vs = 0.55 + 0.45 * Math.sqrt(1 - ds2 / sr2);
          if (vs > v) v = vs;
        }
        out[o + x] += v * weight;
      }
    }
  }

  function sceneRipple(t, out, weight) {
    // 複数発信源の同心円波（水紋）
    const c1x = W * 0.32, c1y = H * 0.42;
    const c2x = W * 0.70, c2y = H * 0.60;
    const k = 14 / Math.min(W, H);   // 波数スケール
    for (let y = 0; y < H; y++) {
      const o = y * W;
      const dy1 = y - c1y, dy2 = y - c2y;
      for (let x = 0; x < W; x++) {
        const dx1 = x - c1x, dx2 = x - c2x;
        const r1 = Math.sqrt(dx1 * dx1 + dy1 * dy1) * k;
        const r2 = Math.sqrt(dx2 * dx2 + dy2 * dy2) * k;
        let v = Math.sin(r1 * 6 - t * 3) / (1 + r1 * 0.5)
              + Math.sin(r2 * 5 - t * 2.4) / (1 + r2 * 0.5);
        v = (v * 0.5 + 0.5);              // 0..1へ
        out[o + x] += v * weight;
      }
    }
  }

  function sceneTerrain(t, out, weight) {
    // 多重サイン波による起伏（疑似フラクタル地形）
    for (let y = 0; y < H; y++) {
      const ny = y / H;
      const o = y * W;
      for (let x = 0; x < W; x++) {
        const nx = x / W;
        let v = 0.5
          + 0.30 * Math.sin(nx * 7 + t * 0.8) * Math.cos(ny * 5 - t * 0.5)
          + 0.14 * Math.sin(nx * 17 - t * 1.4 + ny * 9)
          + 0.06 * Math.sin(nx * 33 + ny * 27 + t);
        if (v < 0) v = 0; else if (v > 1) v = 1;
        out[o + x] += v * weight;
      }
    }
  }

  let textMask = null, textMaskW = 0, textMaskH = 0;
  function buildTextMask() {
    // 立体文字 "4.8" のマスクを内部解像度で生成
    const c = document.createElement("canvas");
    c.width = W; c.height = H;
    const t = c.getContext("2d");
    t.fillStyle = "#000"; t.fillRect(0, 0, W, H);
    t.fillStyle = "#fff";
    t.textAlign = "center";
    t.textBaseline = "middle";
    t.font = "900 " + Math.round(H * 0.46) + "px 'Segoe UI', system-ui, sans-serif";
    t.fillText("4.8", W * 0.5, H * 0.5);
    const d = t.getImageData(0, 0, W, H).data;
    textMask = new Uint8Array(W * H);
    for (let i = 0, p = 0; i < d.length; i += 4, p++) textMask[p] = d[i];
    textMaskW = W; textMaskH = H;
  }
  function sceneText(t, out, weight) {
    if (!textMask || textMaskW !== W || textMaskH !== H) buildTextMask();
    const bob = (Math.sin(t * 1.2) * 0.5 + 0.5) * 0.25; // 文字の上下する浮遊感
    for (let i = 0; i < out.length; i++) {
      const m = textMask[i];
      const v = m ? (0.65 + bob) : 0.10;  // 文字=手前, 背景=奥
      out[i] += v * weight;
    }
  }

  function sceneTunnel(t, out, weight) {
    // 中心へ吸い込まれるトンネル（奥が深い）
    const cx = W * 0.5 + Math.sin(t * 0.5) * W * 0.08;
    const cy = H * 0.5 + Math.cos(t * 0.4) * H * 0.08;
    const maxR = Math.sqrt(cx * cx + cy * cy);
    for (let y = 0; y < H; y++) {
      const dy = y - cy, dy2 = dy * dy;
      const o = y * W;
      for (let x = 0; x < W; x++) {
        const dx = x - cx;
        const r = Math.sqrt(dx * dx + dy2) / maxR;     // 0..1
        const ang = Math.atan2(dy, dx);
        // 渦巻く縞でトンネル感、外周ほど手前
        let v = r + 0.12 * Math.sin(ang * 6 + 1 / (r + 0.05) - t * 2);
        if (v < 0) v = 0; else if (v > 1) v = 1;
        out[o + x] += v * weight;
      }
    }
  }

  const sceneFns = {
    orb: sceneOrb, ripple: sceneRipple, terrain: sceneTerrain,
    text: sceneText, tunnel: sceneTunnel,
  };

  // 深度マップ構築（モード遷移中は2シーンをブレンド）
  function buildDepth(t) {
    depth.fill(0);
    if (state.morph < 1 && state.prevMode !== state.mode) {
      const w = state.morph;
      sceneFns[state.prevMode](t, depth, 1 - w);
      sceneFns[state.mode](t, depth, w);
    } else {
      sceneFns[state.mode](t, depth, 1);
    }
  }

  // =====================================================================
  // SIRDS レンダリング本体
  //   Thimbleby–Witten–Inglis のオートステレオグラム生成法を踏襲。
  //   各行で深度から視差(separation)を求め、左右の画素を「同色」制約で
  //   連結する。隠面（手前の物体に隠れて両眼で見えない部分）は除外し、
  //   右→左へ色を伝播。制約の根にはカラーノイズを敷く。
  // =====================================================================
  function renderStereo() {
    const baseSep = state.sep;
    const maxShift = state.depthAmt;

    for (let y = 0; y < H; y++) {
      const o = y * W;

      // same[x] : x と同色になる相方画素。初期値は自分自身。
      for (let x = 0; x < W; x++) same[x] = x;

      for (let x = 0; x < W; x++) {
        // 視差：手前(depth大)ほどパターン幅(sep)が狭くなる＝飛び出して見える
        const d = depth[o + x];
        let sep = (baseSep - d * maxShift) | 0;
        if (sep < 8) sep = 8;                 // 近すぎる視差の破綻を防ぐ
        const left = (x - (sep >> 1)) | 0;
        const right = left + sep;
        if (left >= 0 && right < W) {
          // 可視性チェック（隠面除去）。
          //   left が既に他のさらに右の点とリンク済みで、その相方の方が手前なら、
          //   今の制約は手前の面の裏に隠れているとみなしてスキップする。
          let visible = true;
          if (same[left] !== left) {
            // left は既にどこかとリンクしている → どちらを採用するか判定
            if (same[left] > right) {
              // 既存リンクの方がより右(=より手前寄り)なら、それを優先
              visible = false;
            }
          }
          if (visible) {
            // 左の画素を右の画素に追従させる（右→左伝播で色が決まる）
            same[left] = right;
          }
        }
      }

      // 色の決定：右端から左へ。根（same[x]==x）はノイズ、それ以外は相方の色。
      for (let x = W - 1; x >= 0; x--) {
        const k3 = x * 3;
        if (same[x] === x) {
          const pk = (o + x) * 3;
          rowRGB[k3]     = pattern[pk];
          rowRGB[k3 + 1] = pattern[pk + 1];
          rowRGB[k3 + 2] = pattern[pk + 2];
        } else {
          const s3 = same[x] * 3;
          rowRGB[k3]     = rowRGB[s3];
          rowRGB[k3 + 1] = rowRGB[s3 + 1];
          rowRGB[k3 + 2] = rowRGB[s3 + 2];
        }
      }

      // カラー強調：深度に応じてパレット色を薄く乗算合成（立体面の陰影）
      const base = o * 4;
      if (state.color) {
        for (let x = 0; x < W; x++) {
          const di = (depth[o + x] * 255) | 0;
          const p3 = di * 3;
          const k3 = x * 3;
          const i4 = base + x * 4;
          // ノイズ色とパレット色を 65:35 でブレンド（立体感の手掛かりを保持）
          px[i4]     = (rowRGB[k3]     * 0.68 + palette[p3]     * 0.32) | 0;
          px[i4 + 1] = (rowRGB[k3 + 1] * 0.68 + palette[p3 + 1] * 0.32) | 0;
          px[i4 + 2] = (rowRGB[k3 + 2] * 0.68 + palette[p3 + 2] * 0.32) | 0;
        }
      } else {
        for (let x = 0; x < W; x++) {
          const k3 = x * 3;
          const i4 = base + x * 4;
          px[i4]     = rowRGB[k3];
          px[i4 + 1] = rowRGB[k3 + 1];
          px[i4 + 2] = rowRGB[k3 + 2];
        }
      }
    }

    bctx.putImageData(img, 0, 0);
  }

  // 内部バッファを画面いっぱいに描画（滑らかに拡大）
  function present() {
    const vw = window.innerWidth, vh = window.innerHeight;
    ctx.drawImage(buf, 0, 0, W, H, 0, 0, vw, vh);
  }

  // =====================================================================
  // メインループ（可変フレーム時間 + 簡易FPS計測）
  // =====================================================================
  let last = performance.now();
  let fpsAcc = 0, fpsCount = 0, fpsTimer = 0;
  const fpsEl = document.getElementById("fps");

  function tick(now) {
    let dt = (now - last) / 1000;
    last = now;
    if (dt > 0.05) dt = 0.05;       // 大きなフレーム飛びを抑制

    if (!state.paused && !reduceMotion) {
      const sp = 0.25 + state.speed * 2.0;
      state.time += dt * sp;
    }
    // シーン遷移の進行
    if (state.morph < 1) {
      state.morph = Math.min(1, state.morph + dt * 1.8);
      if (state.morph >= 1) state.prevMode = state.mode;
    }

    buildDepth(state.time);
    renderStereo();
    present();

    // FPS
    fpsAcc += dt; fpsCount++; fpsTimer += dt;
    if (fpsTimer >= 0.5) {
      const fps = fpsCount / fpsAcc;
      fpsEl.textContent = fps.toFixed(0) + " fps · " + W + "×" + H;
      fpsAcc = 0; fpsCount = 0; fpsTimer = 0;
    }

    requestAnimationFrame(tick);
  }

  // reduced-motion 時は静止画を1枚描く（操作で再描画）
  function renderOnce() {
    buildDepth(state.time);
    renderStereo();
    present();
  }

  // =====================================================================
  // UI 配線
  // =====================================================================
  const ui = {
    mode: document.getElementById("mode"),
    sep: document.getElementById("sep"),
    depth: document.getElementById("depth"),
    speed: document.getElementById("speed"),
    quality: document.getElementById("quality"),
    sepV: document.getElementById("sep-v"),
    depthV: document.getElementById("depth-v"),
    speedV: document.getElementById("speed-v"),
    qualityV: document.getElementById("quality-v"),
    pause: document.getElementById("btn-pause"),
    noise: document.getElementById("btn-noise"),
    guide: document.getElementById("btn-guide"),
    colorBtn: document.getElementById("btn-color"),
    hide: document.getElementById("btn-hide"),
    panel: document.getElementById("panel"),
    toggle: document.getElementById("toggle"),
    guides: document.getElementById("guides"),
  };

  ui.mode.addEventListener("change", () => {
    if (ui.mode.value !== state.mode) {
      state.prevMode = state.mode;
      state.mode = ui.mode.value;
      state.morph = 0;             // 遷移開始
    }
    if (reduceMotion) { state.morph = 1; state.prevMode = state.mode; renderOnce(); }
  });
  ui.sep.addEventListener("input", () => {
    state.sep = parseInt(ui.sep.value, 10);
    ui.sepV.textContent = ui.sep.value;
    updateGuideGap();
    if (reduceMotion) renderOnce();
  });
  ui.depth.addEventListener("input", () => {
    state.depthAmt = parseInt(ui.depth.value, 10);
    ui.depthV.textContent = ui.depth.value;
    if (reduceMotion) renderOnce();
  });
  ui.speed.addEventListener("input", () => {
    state.speed = parseInt(ui.speed.value, 10) / 100;
    ui.speedV.textContent = ui.speed.value;
  });
  let qualityTimer = null;
  ui.quality.addEventListener("input", () => {
    state.quality = parseInt(ui.quality.value, 10) / 100;
    ui.qualityV.textContent = ui.quality.value;
    // 連続操作中の再確保を間引く
    clearTimeout(qualityTimer);
    qualityTimer = setTimeout(() => { allocate(); if (reduceMotion) renderOnce(); }, 120);
  });

  ui.pause.addEventListener("click", () => {
    state.paused = !state.paused;
    ui.pause.textContent = state.paused ? "再生" : "一時停止";
    ui.pause.classList.toggle("on", state.paused);
  });
  ui.noise.addEventListener("click", () => {
    seed = (Math.random() * 0xffffffff) >>> 0;
    buildPattern();
    if (reduceMotion) renderOnce();
  });
  ui.guide.addEventListener("click", () => {
    state.guide = !state.guide;
    ui.guide.classList.toggle("on", state.guide);
    ui.guides.classList.toggle("hidden", !state.guide);
  });
  ui.colorBtn.addEventListener("click", () => {
    state.color = !state.color;
    ui.colorBtn.classList.toggle("on", state.color);
    buildPattern();
    if (reduceMotion) renderOnce();
  });
  ui.hide.addEventListener("click", () => {
    ui.panel.classList.add("collapsed");
    ui.toggle.classList.add("show");
  });
  ui.toggle.addEventListener("click", () => {
    ui.panel.classList.remove("collapsed");
    ui.toggle.classList.remove("show");
  });

  // キーボードショートカット
  window.addEventListener("keydown", (e) => {
    if (e.key === " ") { e.preventDefault(); ui.pause.click(); }
    else if (e.key.toLowerCase() === "n") ui.noise.click();
    else if (e.key.toLowerCase() === "h") {
      if (ui.panel.classList.contains("collapsed")) ui.toggle.click();
      else ui.hide.click();
    }
    else if (e.key.toLowerCase() === "g") ui.guide.click();
  });

  // リサイズ追従（連続イベントを間引き）
  let resizeTimer = null;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { allocate(); if (reduceMotion) renderOnce(); }, 100);
  });

  // ---- 起動 -----------------------------------------------------------
  allocate();
  if (reduceMotion) {
    // アニメは止めるが、合焦ガイドのために1フレーム描画
    renderOnce();
    fpsEl.textContent = "static (reduced motion)";
  } else {
    requestAnimationFrame(tick);
  }
  </script>
</body>
</html>
