<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<!-- AIメタ情報（プロジェクト要件） -->
<meta name="ai.author" content="Claude Opus 4.8">
<meta name="ai.model" content="claude-opus-4-8">
<meta name="ai.note" content="This file was generated by Claude Opus 4.8.">
<meta property="og:title" content="ひなたぼっこと太陽をさがすねこ - Claude Opus 4.8版" />
<meta property="og:type" content="website" />
<meta property="og:locale" content="ja_JP" />
<meta name="theme-color" content="#1a1230">
<title>ひなたぼっこと太陽をさがすねこ - Claude Opus 4.8版</title>
<style>
    /* ===== 全体リセットと土台 ===== */
    :root {
        --ink: #2c2418;
        --paper: #f6efe0;
        --paper-edge: #e6d9bd;
        --gold: #d9a441;
        --accent: #ff9d4d;
        --shadow: rgba(20, 12, 30, 0.45);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0e0a18;
        font-family: "Hiragino Maru Gothic ProN", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        color: var(--ink);
        touch-action: none;
    }

    /* ===== 画面全体を覆うステージ。時間帯で背景がゆっくり変化 ===== */
    #stage {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: background 1.6s ease;
        background: radial-gradient(circle at 50% 28%, #3a2a55, #1a1230 60%, #0e0a18);
    }

    /* 背景の星・きらめき（CSSのみの軽量パーティクル） */
    .sparkles {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.55;
        background-repeat: repeat;
        background-image:
            radial-gradient(1.5px 1.5px at 20% 30%, rgba(255,255,255,0.9), transparent),
            radial-gradient(1.5px 1.5px at 70% 18%, rgba(255,240,200,0.8), transparent),
            radial-gradient(1px 1px at 40% 60%, rgba(255,255,255,0.7), transparent),
            radial-gradient(1.5px 1.5px at 85% 70%, rgba(255,255,255,0.8), transparent),
            radial-gradient(1px 1px at 12% 80%, rgba(255,235,190,0.7), transparent),
            radial-gradient(1px 1px at 55% 90%, rgba(255,255,255,0.6), transparent);
        background-size: 100% 100%;
        animation: twinkle 6s ease-in-out infinite alternate;
        will-change: opacity;
    }
    @keyframes twinkle { from { opacity: 0.35; } to { opacity: 0.7; } }

    /* ===== 本体（パースのかかった3D空間） ===== */
    #book {
        position: relative;
        width: min(86vw, calc(86vh * 0.72), 760px);
        aspect-ratio: 3 / 4;
        perspective: 2600px;
        perspective-origin: 50% 45%;
        filter: drop-shadow(0 30px 50px var(--shadow));
    }

    /* めくられる各ページ。重ねて配置し、回転で前後を切り替える */
    .leaf {
        position: absolute;
        inset: 0;
        border-radius: 14px;
        background: var(--paper);
        transform-style: preserve-3d;
        transform-origin: left center;
        transition: transform 0.9s cubic-bezier(0.62, 0.04, 0.32, 1);
        backface-visibility: hidden;
        overflow: hidden;
        box-shadow:
            inset 0 0 0 1px rgba(255,255,255,0.5),
            inset 0 0 40px rgba(120,90,40,0.12);
        will-change: transform;
    }

    /* 紙の質感（ごく薄いノイズ風グラデーション） */
    .leaf::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
            linear-gradient(105deg, rgba(255,255,255,0.35), transparent 30%),
            linear-gradient(255deg, rgba(120,90,40,0.10), transparent 40%);
        mix-blend-mode: soft-light;
    }

    /* 画像エリア。Ken Burns でゆっくりズーム／パン */
    .art {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 72%;
        overflow: hidden;
        background: #d9cdb4;
    }
    .art img {
        position: absolute;
        inset: -4%;
        width: 108%;
        height: 108%;
        object-fit: cover;
        transform: scale(1.04);
        opacity: 0;
        transition: opacity 1.1s ease;
        will-change: transform;
    }
    .art img.loaded { opacity: 1; }
    /* 現在ページのみ Ken Burns を走らせる（負荷軽減） */
    .leaf.current .art img.loaded {
        animation: kenburns 14s ease-in-out infinite alternate;
    }
    @keyframes kenburns {
        from { transform: scale(1.04) translate(0%, 0%); }
        to   { transform: scale(1.16) translate(-3%, -2%); }
    }

    /* 画像と文章の境目に紙の折り目風グラデ */
    .art::after {
        content: "";
        position: absolute;
        left: 0; right: 0; bottom: 0;
        height: 38px;
        background: linear-gradient(to bottom, transparent, var(--paper));
    }

    /* 文章エリア */
    .caption {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        height: 28%;
        padding: 4% 7% 6%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        background: var(--paper);
    }
    .caption .line {
        font-size: clamp(15px, 2.5vw, 23px);
        line-height: 1.75;
        font-weight: 600;
        letter-spacing: 0.03em;
        color: var(--ink);
    }
    /* 文字を一文字ずつふわっと出す（current のみ） */
    .leaf.current .caption .ch {
        animation: charIn 0.5s both;
    }
    @keyframes charIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ページ番号 */
    .folio {
        position: absolute;
        bottom: 2.5%;
        right: 6%;
        font-size: clamp(11px, 1.4vw, 14px);
        color: var(--gold);
        font-weight: 700;
        letter-spacing: 0.1em;
    }

    /* 製本の背（左端の影） */
    #book::before {
        content: "";
        position: absolute;
        top: 0; bottom: 0;
        left: -10px;
        width: 22px;
        border-radius: 6px 0 0 6px;
        background: linear-gradient(90deg, #2a1d12, #5a3f22 60%, #3a2814);
        box-shadow: -2px 0 16px rgba(0,0,0,0.4);
        z-index: 1;
    }

    /* ===== タイトル（表紙） ===== */
    .cover {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background:
            radial-gradient(circle at 50% 35%, #ffe9b8, #f2c878 55%, #d99a3e);
        color: #5a3a12;
        text-align: center;
        padding: 8%;
    }
    .cover .sun {
        width: clamp(80px, 18vw, 150px);
        aspect-ratio: 1;
        border-radius: 50%;
        background: radial-gradient(circle at 38% 35%, #fff6d8, #ffcf66 55%, #ff9d2e);
        box-shadow: 0 0 50px rgba(255,180,60,0.8), 0 0 110px rgba(255,150,40,0.5);
        animation: sunPulse 4s ease-in-out infinite alternate;
    }
    @keyframes sunPulse {
        from { transform: scale(1); filter: brightness(1); }
        to   { transform: scale(1.06); filter: brightness(1.12); }
    }
    .cover h1 {
        font-size: clamp(20px, 4.4vw, 38px);
        font-weight: 800;
        letter-spacing: 0.06em;
        line-height: 1.5;
        text-shadow: 0 2px 0 rgba(255,255,255,0.4);
    }
    .cover .badge {
        font-size: clamp(11px, 1.6vw, 15px);
        font-weight: 700;
        letter-spacing: 0.14em;
        padding: 6px 16px;
        border-radius: 999px;
        background: rgba(90,58,18,0.12);
        color: #6b4516;
    }
    .cover .start {
        margin-top: 6px;
        font-size: clamp(12px, 1.8vw, 16px);
        opacity: 0.85;
        animation: bob 2s ease-in-out infinite;
    }
    @keyframes bob { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(6px);} }

    /* ===== 操作UI ===== */
    .nav {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        width: clamp(46px, 6vw, 64px);
        aspect-ratio: 1;
        border: none;
        border-radius: 50%;
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(6px);
        color: #fff;
        font-size: clamp(20px, 3vw, 30px);
        cursor: pointer;
        z-index: 30;
        display: grid;
        place-items: center;
        transition: background 0.25s ease, transform 0.25s ease, opacity 0.3s ease;
    }
    .nav:hover { background: rgba(255,255,255,0.26); transform: translateY(-50%) scale(1.08); }
    .nav:active { transform: translateY(-50%) scale(0.94); }
    .nav.prev { left: clamp(10px, 3vw, 32px); }
    .nav.next { right: clamp(10px, 3vw, 32px); }
    .nav:disabled { opacity: 0.25; cursor: default; }

    /* 進捗インジケーター（下部のドット） */
    #progress {
        position: fixed;
        bottom: clamp(14px, 3vh, 30px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        z-index: 30;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(0,0,0,0.22);
        backdrop-filter: blur(6px);
    }
    #progress .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: rgba(255,255,255,0.35);
        cursor: pointer;
        transition: background 0.3s ease, transform 0.3s ease;
    }
    #progress .dot.active { background: var(--accent); transform: scale(1.35); }

    /* 操作ヒント */
    #hint {
        position: fixed;
        top: clamp(12px, 3vh, 24px);
        left: 50%;
        transform: translateX(-50%);
        z-index: 30;
        color: rgba(255,255,255,0.85);
        font-size: clamp(11px, 1.4vw, 14px);
        letter-spacing: 0.08em;
        padding: 7px 16px;
        border-radius: 999px;
        background: rgba(0,0,0,0.25);
        backdrop-filter: blur(6px);
        pointer-events: none;
        transition: opacity 0.6s ease;
    }

    /* prefers-reduced-motion: 動きを抑制 */
    @media (prefers-reduced-motion: reduce) {
        .leaf { transition: transform 0.01s linear; }
        .leaf.current .art img.loaded,
        .cover .sun,
        .sparkles,
        .cover .start,
        .leaf.current .caption .ch { animation: none !important; }
        #stage { transition: none; }
        .art img { transform: scale(1.02); }
    }
</style>
</head>
<body>
    <div id="stage">
        <div class="sparkles" aria-hidden="true"></div>
        <div id="book" role="region" aria-label="絵本ビューア"></div>
    </div>

    <button class="nav prev" id="prev" aria-label="前のページ">‹</button>
    <button class="nav next" id="next" aria-label="次のページ">›</button>
    <div id="progress" aria-label="ページ進捗"></div>
    <div id="hint">クリック / ← → / スワイプ でページをめくる</div>

<script>
"use strict";

/* ============================================================
   ひなたぼっこと太陽をさがすねこ - Claude Opus 4.8版
   ・単一HTML / 外部CDNなし
   ・3Dページめくり、Ken Burns、時間帯で変わる背景、進捗UI
   ============================================================ */

// ストーリー本文（元デモ踏襲）
const STORY = [
    "あるひ、ねこはひなたぼっこをしていました。",
    "でも、太陽がどこかへいってしまいました。",
    "ねこは太陽をさがしにでかけました。",
    "みちのりはいろいろなできごとがありました。",
    "つかれて、ねこはきのしたでねむりました。",
    "あさになって、ねこはめをさました。",
    "ねこは、あさの太陽をみつけてよろこびました。",
    "ねこは、なにかをもとめるときはねていればいいとわかりました。",
    "ねこは、ひなたぼっこをしながらそれをかんがえました。",
    "そして、しあわせそうにひなたぼっこをしているねこでおわりです。"
];

// ページごとの背景色（物語の時間帯に合わせて昼→夜→朝へ）
const MOODS = [
    "radial-gradient(circle at 50% 30%, #bfe6ff, #79b9e8 55%, #4a86c4)", // 昼
    "radial-gradient(circle at 60% 25%, #ffd9a0, #f0a85f 55%, #c87a3a)", // 夕方の予感
    "radial-gradient(circle at 55% 28%, #f5b06a, #d97f48 55%, #8f4f33)", // 夕焼け
    "radial-gradient(circle at 50% 30%, #c98b6a, #7a5a72 55%, #3f3556)", // 黄昏
    "radial-gradient(circle at 50% 25%, #4a3a66, #271f44 55%, #120e26)", // 夜
    "radial-gradient(circle at 50% 30%, #6a5a8a, #3a3060 55%, #1c1838)", // 夜明け前
    "radial-gradient(circle at 50% 30%, #ffd9b0, #ffae7a 55%, #e88a55)", // 朝日
    "radial-gradient(circle at 50% 30%, #ffe6b8, #ffc98a 55%, #f0a860)", // 朝
    "radial-gradient(circle at 50% 30%, #cfeaff, #9bcdec 55%, #6aa9d4)", // 昼
    "radial-gradient(circle at 50% 30%, #bfe6ff, #ffe39a 55%, #f0b860)"  // しあわせ
];

const book = document.getElementById("book");
const stage = document.getElementById("stage");
const progress = document.getElementById("progress");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const hint = document.getElementById("hint");
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

const TOTAL = STORY.length + 1; // +1 は表紙
let index = 0;            // 0 = 表紙、1..10 = 各ページ
let animating = false;
const leaves = [];

// ----- 表紙の生成 -----
const cover = document.createElement("div");
cover.className = "leaf current";
cover.style.zIndex = TOTAL;
cover.innerHTML = `
    <div class="cover">
        <div class="sun" aria-hidden="true"></div>
        <h1>ひなたぼっこと<br>太陽をさがすねこ</h1>
        <div class="badge">Claude Opus 4.8 版</div>
        <div class="start">タップして はじまり ▸</div>
    </div>`;
book.appendChild(cover);
leaves.push(cover);

// ----- 各ストーリーページの生成 -----
STORY.forEach((text, i) => {
    const n = i + 1;
    const leaf = document.createElement("div");
    leaf.className = "leaf";
    leaf.style.zIndex = TOTAL - n; // 表紙の下に順に重ねる

    // 一文字ずつ span 化（出現アニメ用）
    const chars = [...text].map((c, k) =>
        `<span class="ch" style="animation-delay:${0.25 + k * 0.035}s">${c === " " ? "&nbsp;" : c}</span>`
    ).join("");

    leaf.innerHTML = `
        <div class="art">
            <img alt="ページ${n}の挿絵" loading="lazy" data-src="../page${n}_image.png">
        </div>
        <div class="caption"><div class="line">${chars}</div></div>
        <div class="folio">${n} / ${STORY.length}</div>`;
    book.appendChild(leaf);
    leaves.push(leaf);
});

// ----- 進捗ドット -----
for (let i = 0; i < TOTAL; i++) {
    const dot = document.createElement("div");
    dot.className = "dot" + (i === 0 ? " active" : "");
    dot.title = i === 0 ? "表紙" : `ページ ${i}`;
    dot.addEventListener("click", () => goTo(i));
    progress.appendChild(dot);
}
const dots = [...progress.children];

// ----- 画像の遅延読み込み（隣接ページを先読み） -----
function loadImage(i) {
    const leaf = leaves[i];
    if (!leaf) return;
    const img = leaf.querySelector("img");
    if (img && img.dataset.src) {
        img.src = img.dataset.src;
        img.removeAttribute("data-src");
        img.addEventListener("load", () => img.classList.add("loaded"), { once: true });
        // 既にキャッシュ済みの場合の保険
        if (img.complete) img.classList.add("loaded");
    }
}
function preloadAround(i) {
    loadImage(i);
    loadImage(i + 1);
    loadImage(i - 1);
}

// ----- 背景の更新 -----
function updateMood(i) {
    if (i === 0) {
        stage.style.background = "radial-gradient(circle at 50% 28%, #3a2a55, #1a1230 60%, #0e0a18)";
    } else {
        stage.style.background = MOODS[i - 1] || MOODS[MOODS.length - 1];
    }
}

// ----- ページ遷移の中核 -----
function render() {
    leaves.forEach((leaf, i) => {
        // めくり済み（i < index）は左へ180度回転して裏返す
        leaf.style.transform = i < index ? "rotateY(-178deg)" : "rotateY(0deg)";
        leaf.classList.toggle("current", i === index);
    });
    dots.forEach((d, i) => d.classList.toggle("active", i === index));
    prevBtn.disabled = index === 0;
    nextBtn.disabled = index === TOTAL - 1;
    updateMood(index);
    preloadAround(index);
}

function goTo(target) {
    target = Math.max(0, Math.min(TOTAL - 1, target));
    if (target === index || animating) return;
    animating = true;
    index = target;
    render();
    // アニメーション終了までロック（reduce 時は即時）
    const dur = reduceMotion ? 20 : 900;
    setTimeout(() => { animating = false; }, dur);
}

const next = () => goTo(index + 1);
const prev = () => goTo(index - 1);

// ----- 操作系 -----
nextBtn.addEventListener("click", (e) => { e.stopPropagation(); next(); });
prevBtn.addEventListener("click", (e) => { e.stopPropagation(); prev(); });

// 画面クリックで前進（左1/4クリックは戻る）
stage.addEventListener("click", (e) => {
    const x = e.clientX / window.innerWidth;
    if (x < 0.28) prev(); else next();
});

// キーボード
window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight" || e.key === " " || e.key === "Enter") { e.preventDefault(); next(); }
    else if (e.key === "ArrowLeft") { e.preventDefault(); prev(); }
    else if (e.key === "Home") goTo(0);
    else if (e.key === "End") goTo(TOTAL - 1);
});

// スワイプ
let touchX = null;
stage.addEventListener("touchstart", (e) => { touchX = e.touches[0].clientX; }, { passive: true });
stage.addEventListener("touchend", (e) => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 40) { dx < 0 ? next() : prev(); }
    touchX = null;
});

// 操作ヒントは数秒で自動的にフェードアウト
setTimeout(() => { hint.style.opacity = "0"; }, 4500);

// 初期描画
render();
</script>
</body>
</html>
